<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>英语测试达人</title>
<style>
  :root {
    --primary: #6366F1;
    --primary-light: #EEF2FF;
    --primary-dark: #4F46E5;
    --success: #10B981;
    --success-light: #ECFDF5;
    --danger: #EF4444;
    --danger-light: #FEF2F2;
    --accent: #F59E0B;
    --accent-light: #FFFBEB;
    --purple: #8B5CF6;
    --purple-light: #F5F3FF;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-500: #6B7280;
    --gray-600: #4B5563;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --radius: 14px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 50%, #A855F7 100%);
    min-height: 100vh;
    color: var(--gray-800);
    overflow-x: hidden;
  }

  /* ====== 首页 ====== */
  .home-page { display:flex; flex-direction:column; min-height:100vh; overflow-y:auto; }
  .home-hero {
    text-align:center; padding:40px 20px 20px; color:white;
  }
  .home-hero h1 { font-size:28px; font-weight:800; text-shadow:0 2px 8px rgba(0,0,0,0.2); }
  .home-hero p { font-size:14px; opacity:0.8; margin-top:6px; }

  /* Stats */
  .home-stats {
    display:flex; justify-content:center; gap:24px; padding:12px 20px; color:white;
  }
  .home-stat { text-align:center; }
  .home-stat-icon { font-size:24px; }
  .home-stat-val { font-size:20px; font-weight:700; }
  .home-stat-label { font-size:11px; opacity:0.7; }

  /* Mode grid */
  .mode-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
    padding:16px 16px; max-width:500px; margin:0 auto;
  }
  .mode-card {
    background:white; border-radius:var(--radius); padding:18px 14px;
    box-shadow:0 4px 16px rgba(0,0,0,0.12);
    cursor:pointer; transition:all 0.2s; text-align:center;
    touch-action:manipulation; user-select:none;
  }
  .mode-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.18); }
  .mode-card:active { transform:translateY(-1px); }
  .mode-card-icon { font-size:32px; margin-bottom:6px; }
  .mode-card-title { font-size:15px; font-weight:700; }
  .mode-card-desc { font-size:12px; color:var(--gray-500); margin-top:4px; }

  /* Category bar */
  .cat-section {
    padding:12px 16px 24px; max-width:500px; margin:0 auto;
  }
  .cat-label { font-size:13px; color:rgba(255,255,255,0.7); font-weight:600; margin-bottom:8px; }
  .cat-bar { display:flex; flex-wrap:wrap; gap:6px; }
  .cat-btn {
    padding:7px 14px; border-radius:18px; border:1.5px solid rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.12); color:white; font-size:12px;
    cursor:pointer; transition:all 0.2s; font-weight:500;
    touch-action:manipulation; user-select:none;
  }
  .cat-btn:hover { background:rgba(255,255,255,0.25); }
  .cat-btn.active { background:white; color:var(--primary); border-color:white; }

  /* ====== Test Page ====== */
  .test-page { display:none; min-height:100vh; }
  .test-page.active { display:flex; flex-direction:column; }

  /* Top bar */
  .test-top {
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; background:rgba(255,255,255,0.1); color:white;
  }
  .test-back {
    background:rgba(255,255,255,0.2); border:none; color:white;
    padding:8px 14px; border-radius:20px; font-size:13px; cursor:pointer;
    touch-action:manipulation; user-select:none;
  }
  .test-back:hover { background:rgba(255,255,255,0.3); }
  .test-info { font-size:14px; font-weight:600; }
  .test-timer { font-size:14px; font-weight:700; }

  /* Progress dots */
  .progress-dots {
    display:flex; gap:3px; padding:8px 16px; justify-content:center;
  }
  .p-dot {
    width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.3);
    transition:all 0.3s;
  }
  .p-dot.done { background:var(--success); }
  .p-dot.fail { background:var(--danger); }
  .p-dot.skip { background:#F59E0B; }
  .p-dot.current { background:white; transform:scale(1.4); }

  /* Timer bar */
  .timer-bar-wrap { padding:4px 16px; }
  .timer-bar { width:100%; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; }
  .timer-fill { height:100%; border-radius:2px; background:white; transition:width 0.3s; }
  .timer-fill.warn { background:var(--accent); }
  .timer-fill.crit { background:var(--danger); }

  /* Lives */
  .lives-row { display:flex; gap:4px; justify-content:center; padding:6px 0; }
  .heart { font-size:20px; transition:all 0.3s; }
  .heart.lost { opacity:0.15; transform:scale(0.7); }

  /* Question area */
  .q-area {
    background:white; border-radius:20px 20px 0 0;
    padding:24px 20px; flex:1; margin-top:8px;
    box-shadow:0 -4px 20px rgba(0,0,0,0.08);
  }
  .q-type-badge {
    display:inline-block; padding:3px 10px; border-radius:10px;
    font-size:11px; font-weight:600; margin-bottom:12px;
  }
  .badge-grammar { background:var(--primary-light); color:var(--primary); }
  .badge-vocab { background:var(--success-light); color:var(--success); }
  .badge-phrase { background:var(--accent-light); color:#92400E; }
  .badge-scene { background:var(--purple-light); color:var(--purple); }
  .badge-error { background:var(--danger-light); color:var(--danger); }
  .badge-sentence { background:#F3E8FF; color:#7C3AED; }
  .badge-sent-dict { background:#F3E8FF; color:#7C3AED; }
  .badge-sent-fill { background:#EDE9FE; color:#6D28D9; }
  .badge-sent-app { background:#DDD6FE; color:#5B21B6; }

  .q-text { font-size:18px; font-weight:700; margin-bottom:16px; line-height:1.5; }
  .q-hint { font-size:13px; color:var(--gray-500); margin-bottom:16px; }

  /* Bookmark button */
  .bm-btn {
    display:inline-flex; align-items:center; gap:4px; padding:4px 12px;
    border-radius:16px; border:1.5px solid #E5E7EB; background:white;
    font-size:16px; cursor:pointer; transition:all 0.2s; touch-action:manipulation;
    color:#9CA3AF; margin-left:0; vertical-align:middle;
  }
  .bm-btn:hover { border-color:#F59E0B; color:#F59E0B; background:#FFFBEB; }
  .bm-btn.bookmarked { color:#F59E0B; border-color:#F59E0B; background:#FFFBEB; }

  /* Options */
  .opts-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .opt-btn {
    padding:14px 12px; border-radius:12px; border:2px solid var(--gray-200);
    background:white; font-size:14px; cursor:pointer; transition:all 0.2s;
    font-weight:500; text-align:center; line-height:1.4;
    touch-action:manipulation; user-select:none;
  }
  .opt-btn:hover { border-color:var(--primary); background:var(--primary-light); }
  .opt-btn.selected { border-color:var(--primary); background:var(--primary-light); color:var(--primary); }
  .opt-btn.correct { border-color:var(--success); background:var(--success-light); color:#065F46; animation:pop 0.3s; }
  .opt-btn.wrong { border-color:var(--danger); background:var(--danger-light); color:#991B1B; }
  @keyframes pop { 50% { transform:scale(1.05); } }

  /* Type input */
  .type-wrap { text-align:center; }
  .type-prompt-big { font-size:36px; font-weight:800; color:var(--primary); margin:16px 0 8px; }
  .type-input {
    width:100%; max-width:360px; padding:14px 20px; border:3px solid var(--gray-200);
    border-radius:12px; font-size:18px; text-align:center; outline:none; margin-top:8px;
  }
  .type-input:focus { border-color:var(--primary); }
  .type-input.correct { border-color:var(--success); background:var(--success-light); }
  .type-input.wrong { border-color:var(--danger); background:var(--danger-light); }

  /* Fill-blank */
  .fill-wrap { text-align:center; }
  .fill-sentence {
    font-size:18px; line-height:1.8; margin-bottom:16px;
  }
  .fill-blank {
    display:inline-block; min-width:80px; border-bottom:3px solid var(--primary);
    padding:2px 4px; font-weight:700; color:var(--primary);
  }
  .fill-blank.revealed { color:var(--success); border-color:var(--success); }
  .fill-blank.wrong-reveal { color:var(--danger); border-color:var(--danger); }
  .fill-input {
    width:100%; max-width:360px; padding:14px 20px; border:3px solid var(--gray-200);
    border-radius:12px; font-size:16px; text-align:center; outline:none;
  }
  .fill-input:focus { border-color:var(--primary); }
  .fill-input.correct { border-color:var(--success); background:var(--success-light); }
  .fill-input.wrong { border-color:var(--danger); background:var(--danger-light); }
  .submit-btn {
    display:inline-block; padding:12px 32px; border-radius:25px; border:none;
    background:var(--primary); color:white; font-size:15px; font-weight:600;
    cursor:pointer; margin-top:12px; transition:transform 0.15s;
    touch-action:manipulation;
  }
  .submit-btn:hover { transform:scale(1.03); }

  .skip-btn {
    display:inline-block; padding:8px 18px; border-radius:20px; border:1.5px dashed #9CA3AF;
    background:transparent; color:#6B7280; font-size:13px; font-weight:500;
    cursor:pointer; transition:all 0.15s; touch-action:manipulation;
  }
  .skip-btn:hover { border-color:var(--primary); color:var(--primary); background:#F5F3FF; }

  /* ====== Explanation ====== */
  .explain-box {
    background:var(--gray-50); border-radius:12px; padding:16px; margin-top:16px;
    border-left:4px solid var(--primary); animation:slideUp 0.3s;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .explain-title {
    font-size:15px; font-weight:700; color:var(--primary); margin-bottom:8px;
    display:flex; align-items:center; gap:6px;
  }
  .explain-body { font-size:13px; color:var(--gray-600); line-height:1.6; }
  .explain-body .en { color:var(--primary); font-weight:600; }
  .explain-body .highlight { background:var(--accent-light); padding:1px 4px; border-radius:3px; font-weight:600; }
  .explain-body .wrong { color:var(--danger); text-decoration:line-through; }
  .explain-body .right { color:var(--success); font-weight:600; }
  .explain-tip {
    background:var(--accent-light); border-radius:8px; padding:8px 12px;
    margin-top:8px; font-size:12px; color:#92400E;
  }
  .explain-tip::before { content:'💡 '; }

  .next-btn-wrap { text-align:center; margin-top:16px; }
  .next-btn {
    padding:12px 40px; border-radius:25px; border:none;
    background:var(--primary); color:white; font-size:15px;
    font-weight:600; cursor:pointer; transition:transform 0.15s;
    touch-action:manipulation; user-select:none;
  }
  .next-btn:hover { transform:scale(1.03); }

  /* ====== Result Page ====== */
  .result-page { display:none; min-height:100vh; }
  .result-page.active { display:flex; flex-direction:column; align-items:center; }
  .result-card {
    background:white; border-radius:20px; padding:32px 24px; margin:24px 16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.15); text-align:center; max-width:460px; width:100%;
  }
  .result-emoji { font-size:64px; margin-bottom:8px; }
  .result-score {
    font-size:56px; font-weight:800;
    background:linear-gradient(135deg, var(--primary), #a855f7);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .result-label { font-size:16px; color:var(--gray-600); margin-bottom:20px; }
  .result-grid { display:flex; justify-content:center; gap:16px; margin-bottom:20px; }
  .result-item { text-align:center; padding:12px 16px; border-radius:12px; background:var(--gray-50); }
  .result-item .num { font-size:24px; font-weight:700; }
  .result-item .label { font-size:11px; color:var(--gray-500); }

  /* Weak points */
  .weak-section {
    margin-top:16px; text-align:left; width:100%;
  }
  .weak-title { font-size:14px; font-weight:700; color:var(--danger); margin-bottom:8px; }
  .weak-list { font-size:13px; color:var(--gray-600); line-height:1.8; }
  .weak-list .en { color:var(--primary); font-weight:600; }

  .result-btns { display:flex; gap:10px; justify-content:center; margin-top:16px; }
  .btn-primary {
    padding:12px 32px; border-radius:25px; border:none;
    background:var(--primary); color:white; font-size:15px; font-weight:600; cursor:pointer;
    touch-action:manipulation; user-select:none;
  }
  .btn-primary:hover { transform:scale(1.03); }
  .btn-outline {
    padding:12px 32px; border-radius:25px; border:2px solid var(--gray-300);
    background:white; color:var(--gray-700); font-size:15px; font-weight:600; cursor:pointer;
    touch-action:manipulation; user-select:none;
  }

  /* ====== Score float ====== */
  .score-float {
    position:fixed; pointer-events:none; font-size:20px; font-weight:700; z-index:998;
    animation:floatUp 0.8s forwards;
  }
  @keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }

  /* ====== Toast ====== */
  .toast-msg {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.75); color:white; padding:16px 28px;
    border-radius:12px; font-size:14px; font-weight:600; z-index:9999;
    animation:toastIn 0.3s, toastOut 0.3s 2.2s forwards;
    white-space:pre-wrap; text-align:center; max-width:80%;
  }
  @keyframes toastIn { from{opacity:0;transform:translate(-50%,-50%) scale(0.8)} to{opacity:1;transform:translate(-50%,-50%) scale(1)} }
  @keyframes toastOut { to{opacity:0;transform:translate(-50%,-50%) scale(0.8)} }

  /* ====== Combo ====== */
  .combo-pop {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:42px; font-weight:900; color:var(--accent); pointer-events:none; z-index:999;
    text-shadow:0 2px 12px rgba(245,158,11,0.4);
  }
  .combo-pop.show { animation:comboPop 0.8s forwards; }
  @keyframes comboPop {
    0%{transform:translate(-50%,-50%) scale(0);opacity:1}
    30%{transform:translate(-50%,-50%) scale(1.2);opacity:1}
    100%{transform:translate(-50%,-80%) scale(0.8);opacity:0}
  }

  /* ====== Mobile Responsive ====== */
  @media (max-width:480px) {
    .home-hero h1 { font-size:22px; }
    .mode-grid { grid-template-columns:1fr 1fr; gap:8px; padding:12px 12px; }
    .mode-card { padding:14px 10px; }
    .mode-card-icon { font-size:26px; }
    .q-text { font-size:16px; }
    .opts-grid { grid-template-columns:1fr 1fr; gap:8px; }
    .opt-btn { padding:12px 10px; font-size:13px; }
    .type-prompt-big { font-size:28px; }
    .result-score { font-size:44px; }
  }
  @media (min-width:600px) {
    .q-area { padding:32px 40px; }
    .opts-grid { grid-template-columns:1fr 1fr; gap:12px; }
    .mode-grid { max-width:540px; }
  }
</style>
</head>

<a href="index.html" style="display:inline-block;margin:8px 16px;padding:6px 14px;background:#10B981;color:white;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;">← 返回首页</a>

<!-- ====== 首页 ====== -->
<div class="home-page" id="homePage">
  <div class="home-hero">
    <h1>🎯 英语测试达人</h1>
    <p>6种玩法 · 200+题目 · 随时随地练</p>
  </div>

  <div class="home-stats">
    <div class="home-stat">
      <div class="home-stat-icon">🏆</div>
      <div class="home-stat-val" id="hScore">0</div>
      <div class="home-stat-label">总积分</div>
    </div>
    <div class="home-stat">
      <div class="home-stat-icon">🔥</div>
      <div class="home-stat-val" id="hCombo">0</div>
      <div class="home-stat-label">最高连击</div>
    </div>
    <div class="home-stat">
      <div class="home-stat-icon">✅</div>
      <div class="home-stat-val" id="hMaster">0</div>

      <div class="mode-card-icon">❤️</div>

    </div>

      <div class="mode-card-icon">🌐</div>

      <div class="mode-card-desc">全题库 · 所有题型混搭</div>

    <div class="mode-card" onclick="startMode('bookmark')" style="background:linear-gradient(135deg,#FEF3C7,#FFF7ED);border:2px solid #F59E0B;">
      <div class="mode-card-icon">⭐</div>

  <div class="cat-section">
    <div class="cat-label">选择测试范围：</div>
    <div class="cat-bar" id="catBar"></div>
  </div>
</div>

<!-- ====== 测试页 ====== -->
<div class="test-page" id="testPage">
  <div class="test-top">
    <button class="test-back" onclick="goHome()">← 返回</button>
    <div class="test-info" id="testInfo">第 1/20 题</div>
    <div class="test-timer" id="testTimer"></div>

  <div class="timer-bar-wrap" id="timerWrap" style="display:none;">

  <div class="result-card" id="resultCard"></div>
</div>

<div class="combo-pop" id="comboPop"></div>

<script>
// ============ QUESTION BANK ============
const Q = {
  grammar: [
    // === 时态 ===
    { id:'g1', cat:'grammar', type:'choice', badge:'语法',
      q:'"I ___ there in 2019." 选哪个？', hint:'注意有明确过去年份',
      opts:['have been','was','am going to','will be'], ans:1,
      explain:'【知识点】现在完成时 vs 一般过去时<br><br>有具体过去时间(in 2019)→只能用一般过去时 <span class="right">was</span>。<br><br>【易错点】<span class="wrong">have been</span> 不能搭配具体过去时间！这是现在完成时的<strong>硬禁忌</strong>。<br><br>【规则对比】<br>• 现在完成时：强调"过去动作对现在的影响"，不能加过去时间<br>• 一般过去时：单纯叙述过去事件，必须/可以加过去时间<br><br>【例子对比】<br>✅ I <span class="right">was</span> there in 2019.（单纯叙述，带过去时间）<br>✅ I <span class="right">have been</span> there.（去过，现在有经验，不带时间）<br>❌ I <span class="wrong">have been</span> there in 2019.（错误！现完不能加过去时间）',
      tip:'现在完成时禁忌：不能搭配具体过去时间(in 2019 / yesterday / last week)' },
    { id:'g2', cat:'grammar', type:'choice', badge:'语法',
      q:'"I\'ve ___ there." — 我去过那儿。填什么？', hint:'be动词的完成式',
      opts:['went','been','gone','was'], ans:1,

    { id:'p11', cat:'phrase', type:'choice', badge:'搭配',

      explain:'【知识点】suggest用法详解<br><br><span class="right">suggest doing sth</span> = 建议做某事<br>❌ <span class="wrong">suggest to do</span> = 绝对错误！<br><br>【三大结构】<br>① suggest + doing<br>✅ I suggest <span class="right">bringing</span> wet wipes.<br>❌ I suggest <span class="wrong">to bring</span> wet wipes.<br><br>② suggest + (that) sb (should) do<br>✅ I suggest we <span class="right">(should) take</span> a raincoat.<br>→ 虚拟语气，should可省略<br><br>③ recommend用法同suggest<br>✅ I recommend <span class="right">eating</span> more vegetables.<br>❌ I recommend <span class="wrong">to eat</span> more vegetables.<br><br>【记忆口诀】<br>suggest/recommend → 后面只接doing！<br>绝不接to do！', tip:'铁律：suggest/recommend后只能接doing，不能接to do' },

      explain:'【知识点】go doing 结构<br><br><span class="right">go camping</span> = 去露营（休闲活动）<br><span class="wrong">go to camp</span> = 去夏令营（特指夏令营）<br><br>【go doing 结构规律】<br>go + doing = 去做某项休闲活动<br>• go swimming → 去游泳<br>• go hiking → 去徒步<br>• go fishing → 去钓鱼<br>• go shopping → 去购物<br>• go skiing → 去滑雪<br><br>【特殊搭配辨析】<br>✅ go to the forest to camp → 去森林露营(强调目的地)<br>❌ go to camp → 不是休闲露营<br><br>【记忆口诀】<br>休闲活动 → go + doing<br>夏令营 → go to camp', tip:'go doing = 休闲活动(go camping/swimming/hiking)' },

    { id:'p14', cat:'phrase', type:'choice', badge:'搭配',
      q:'"in case of" 后面接什么？', opts:['完整句子','名词/名词短语','动词原形','doing形式'], ans:1,
      explain:'【知识点】in case of vs in case<br><br><span class="right">in case of</span> + 名词/名词短语 = 万一；以防<br>✅ In case of <span class="right">rain</span>, take a raincoat.<br><br><span class="wrong">in case</span> + 完整句子 = 万一；以防<br>✅ In case <span class="right">it rains</span>, take a raincoat.<br><br>【辨析对比】<br>• in case of + 名词 → In case of emergency<br>• in case + 句子 → In case it is an emergency<br><br>【相关搭配】<br>• protect sb from sth → 保护某人免受…<br>✅ A sun hat protects us <span class="right">from</span> the sun.<br><br>• There is no need to do → 没必要做<br>✅ There is no need to take too many snacks.<br><br>【记忆口诀】<br>in case of → 后接名词<br>in case → 后接句子', tip:'in case of+名词 vs in case+句子' },

    // ===== 新增：频率副词 =====
    { id:'g31', cat:'grammar', type:'choice', badge:'语法',
      q:'频率副词位置：正确的是？', opts:['I seldom fasten my seat belt.','I fasten seldom my seat belt.','I fasten my seat belt seldom.','Seldom I fasten my seat belt.'], ans:0,
      explain:'【知识点】频率副词位置规则<br><br><span class="right">频率副词放在实义动词前面</span><br>✅ I <span class="right">seldom</span> fasten my seat belt.<br><br>【两大规则】<br>① 实义动词前<br>✅ I <span class="right">often</span> go to the gym.<br>✅ She <span class="right">usually</span> eats breakfast.<br><br>② be动词后<br>✅ I am <span class="right">usually</span> busy.<br>✅ He is <span class="right">always</span> late.<br><br>【sometimes特殊】<br>sometimes可放在句首/句中/句尾<br>✅ Sometimes I walk.<br>✅ I sometimes walk.<br>✅ I walk sometimes.<br><br>【频率排序】<br>never(0%) → rarely(5%) → seldom(10%) → occasionally(15%) → sometimes(25%) → often(50%) → usually(70%) → always(90%)<br><br>【记忆口诀】<br>实义动词前，be动词后<br>sometimes三处均可', tip:'频率副词位置：实义动词前，be动词后' },
    { id:'g32', cat:'grammar', type:'choice', badge:'语法',
      q:'"Everyone ___ a phone." 填什么？', opts:['need','needs','needing','have needed'], ans:1,
      explain:'【知识点】不定代词主谓一致<br><br><span class="right">everyone</span> 视作第三人称单数 → 谓语用 <span class="right">needs</span><br><br>【铁律】<br>everyone / nobody / somebody / everything / nothing → 全部视作三单<br><br>【例句对比】<br>✅ Everyone <span class="right">needs</span> a phone.<br>❌ Everyone <span class="wrong">need</span> a phone.<br>✅ Nobody <span class="right">knows</span> the answer.<br>❌ Nobody <span class="wrong">know</span> the answer.<br><br>【易错点】<br>虽然everyone指很多人，但语法上它就是一个"每个人"的概念<br>→ 谓语动词用三单形式<br><br>【相关语法】one of + 复数名词 + 单数谓语<br>✅ One of my friends <span class="right">is</span> tall.<br>❌ One of my friends <span class="wrong">are</span> tall.', tip:'不定代词(everyone/nobody/somebody)→三单谓语' },
    { id:'g33', cat:'grammar', type:'choice', badge:'语法',
      q:'"I used to ___ cardio every day." 填什么？', opts:['do','doing','did','does'], ans:0,
      explain:'【知识点】used to do vs be used to doing<br><br><span class="right">used to do</span> = 过去常常做（现在不再做了）<br>→ to后接<b>动词原形</b><br><br>【两大结构辨析】<br>① used to do → 过去常常做（现已停止）<br>✅ I <span class="right">used to</span> do cardio every day.<br>= 我过去每天都做有氧（现在不做了）<br><br>② be used to doing → 习惯于做<br>✅ I <span class="right">am used to</span> eating early.<br>= 我习惯于早吃（现在还是这样）<br><br>【关键区别】<br>• used to → to后接<b>动词原形</b>(do)<br>• be used to → to后接<b>动名词</b>(doing)<br><br>【记忆口诀】<br>used to do → 过去做（现在不做了）<br>be used to doing → 习惯做（现在还在做）', tip:'used to do过去常做 vs be used to doing习惯于做' },

      explain:'【知识点】原因连接词<br><br><span class="right">due to</span> + 名词/名词短语 = 因为…<br><br>【原因连接词对比】<br>• <span class="right">due to</span> + 名词 → Due to <span class="right">the rain</span>, we stayed home.<br>• <span class="right">because</span> + 句子 → Because <span class="right">it was raining</span>, we stayed home.<br>• <span class="right">since</span> + 句子 → Since <span class="right">it rained</span>, we stayed home.<br><br>【结果连接词】<br>• <span class="right">therefore</span> → 因此（正式）<br>• <span class="right">so</span> → 所以（口语）<br>• <span class="right">as a result</span> → 结果<br>• <span class="right">consequently</span> → 因此<br><br>【例子对比】<br>✅ Due to <span class="right">the bad weather</span>, the flight was delayed.<br>✅ Because <span class="right">the weather was bad</span>, the flight was delayed.<br><br>【记忆口诀】<br>due to + 名词<br>because/since + 句子<br>therefore/so 表结果', tip:'due to+名词 vs because+句子' },

    // ===== 新增：反身代词 =====
    { id:'g36', cat:'grammar', type:'choice', badge:'语法',
      q:'"I did it by ___ ." 填什么反身代词？', opts:['my','myself','meself','mine'], ans:1,
      explain:'【知识点】反身代词<br><br><span class="right">myself</span> = 我自己<br><br>【反身代词对照表】<br>• I → <span class="right">myself</span><br>• you → <span class="right">yourself</span><br>• he → <span class="right">himself</span><br>• she → <span class="right">herself</span><br>• it → <span class="right">itself</span><br>• we → <span class="right">ourselves</span><br>• they → <span class="right">themselves</span><br><br>【常见搭配】<br>• by myself = 自己做（无他人帮忙）<br>✅ I did it <span class="right">by myself</span>. → 我自己做的<br>• enjoy oneself = 玩得开心<br>✅ Enjoy <span class="right">yourself</span>! → 祝你玩得开心<br>• hurt oneself = 伤到自己<br><br>【易错点】<br>❌ by <span class="wrong">my</span> → my是形容词不是代词<br>✅ by <span class="right">myself</span> → 反身代词才对<br><br>【记忆口诀】<br>反身代词 = 代词 + self/selves<br>I→myself, you→yourself, he→himself', tip:'反身代词=myself/yourself/himself/herself/ourselves/themselves' },

    // ===== 新增：look系列 =====
    { id:'g37', cat:'grammar', type:'choice', badge:'语法',
      q:'"look after" vs "look for" 区别是？', opts:['前者寻找，后者照顾','前者照顾，后者寻找','都表示看','都表示寻找'], ans:1,
      explain:'【知识点】look系列辨析<br><br><span class="right">look after</span> = 照顾、照料<br><span class="right">look for</span> = 寻找<br><br>【look家族全表】<br>• <span class="right">look after</span> → 照顾（照顾老人/小孩）<br>• <span class="right">look for</span> → 寻找（找东西/找人）<br>• <span class="right">look at</span> → 看（注视）<br>• <span class="right">look up</span> → 查阅（查单词/查信息）<br>• <span class="right">look forward to</span> → 期待<br>• <span class="right">look out</span> → 当心小心<br>• <span class="right">look into</span> → 调查<br><br>【例句对比】<br>✅ She <span class="right">looks after</span> the elderly. → 她照顾老人<br>✅ I am <span class="right">looking for</span> my keys. → 我在找钥匙<br>✅ <span class="right">Look out</span>! A car is coming! → 当心！车来了<br><br>【易错点】<br>look forward to + <span class="right">doing</span><br>✅ I look forward to <span class="right">meeting</span> you.<br>❌ I look forward to <span class="wrong">meet</span> you.<br><br>【记忆口诀】<br>look after=照顾, look for=寻找<br>look out=当心, look up=查阅<br>look forward to doing=期待', tip:'look after照顾, look for寻找, look out当心, look forward to doing期待' },

    // ===== 新增：It takes句型 =====
    { id:'g38', cat:'grammar', type:'choice', badge:'语法',
      q:'"It takes 20 minutes ___ walk there." 填什么？', opts:['for','to','by','with'], ans:1,
      explain:'【知识点】It takes + 时间 + to do<br><br><span class="right">It takes + 时间 + to do sth</span><br>= 做某事需要花…时间<br><br>【结构规则】<br>It takes + 时间/精力 + <span class="highlight">to</span> + 动词原形<br><br>【例句】<br>✅ It takes <span class="right">20 minutes to</span> walk there. → 走过去要20分钟<br>✅ It takes <span class="right">3 hours to</span> fly to London. → 飞伦敦要3小时<br>✅ It takes <span class="right">a lot of effort to</span> learn English. → 学英语要很多努力<br><br>【变体句型】<br>• It took me 2 hours to finish the report.<br>→ 我花了2小时完成报告（过去式）<br>• It will take us 5 days to travel there.<br>→ 我们旅行要5天（将来）<br><br>【易错点】<br>❌ It takes 20 minutes <span class="wrong">for</span> walking there.<br>✅ It takes 20 minutes <span class="right">to</span> walk there.<br><br>【记忆口诀】<br>It takes + 时间 + to do<br>注意用to不是for', tip:'It takes+时间+to do=花…时间做某事' },

    // ===== 新增：keep on doing =====
    { id:'g39', cat:'grammar', type:'choice', badge:'语法',
      q:'"Keep on ___" 填什么？', opts:['try','trying','to try','tried'], ans:1,
      explain:'【知识点】keep on doing<br><br><span class="right">keep on doing</span> = 继续做、不断做<br><br>【keep家族】<br>• <span class="right">keep on doing</span> → 继续做（强调反复/不停）<br>• <span class="right">keep doing</span> → 持续做（强调一直做）<br>• <span class="right">keep sb from doing</span> → 阻止某人做<br><br>【例句对比】<br>✅ Keep on <span class="right">trying</span>. → 继续努力<br>✅ She <span class="right">kept on</span> talking. → 她不停说话<br>✅ Keep <span class="right">walking</span>. → 继续走<br><br>【易错点】<br>❌ Keep on <span class="wrong">to try</span>. → 错！keep on后接doing<br>✅ Keep on <span class="right">trying</span>. → 正确！<br><br>【类似规则：只接doing的动词】<br>• keep on + doing<br>• enjoy + doing<br>• finish + doing<br>• suggest + doing<br>• avoid + doing<br><br>【记忆口诀】<br>keep on doing = 继续做<br>keep on后只能接doing', tip:'keep on doing=继续做(后接doing不接to do)' },

    // ===== 新增：there be就近原则 =====
    { id:'g40', cat:'grammar', type:'choice', badge:'语法',
      q:'"There ___ a book and two pens on the desk." 填什么？', opts:['are','is','were','have'], ans:1,
      explain:'【知识点】there be就近原则<br><br><span class="right">There is a book and two pens on the desk.</span><br><br>【就近原则】<br>there be句型中，谓语动词取决于<strong>最近的那个名词</strong><br><br>• a book（单数，最近）→ 用 <span class="right">is</span><br>• two pens（复数，远）→ 不影响谓语<br><br>【更多例句】<br>✅ There <span class="right">is</span> a teacher and 30 students in the room.<br>→ 最近的是a teacher(单数) → 用is<br>✅ There <span class="right">are</span> two pens and a book on the desk.<br>→ 最近的是two pens(复数) → 用are<br><br>【易错点】<br>❌ There <span class="wrong">are</span> a book and two pens. → 错！就近原则<br>✅ There <span class="right">is</span> a book and two pens. → 正确！<br><br>【there be vs have】<br>• there be → 存在（某地有某物）<br>• have → 拥有（某人拥有某物）<br>❌ There <span class="wrong">have</span> a book. → 错！<br><br>【记忆口诀】<br>there be就近原则<br>看最近的名词→单数用is，复数用are<br>there be不是have！', tip:'there be就近原则：看最近的名词定谓语' },

    // ===== 新增：名词+to do后置定语 =====
    { id:'g41', cat:'grammar', type:'choice', badge:'语法',
      q:'"I have something ___ tell you." 填什么？', opts:['for','to','with','by'], ans:1,
      explain:'【知识点】名词 + to do 后置定语<br><br><span class="right">名词 + to do</span> = ...的（东西/事情）<br><br>【结构规则】<br>to do作后置定语，修饰前面的名词<br>= "有…要做的（东西/事情）"<br><br>【例句】<br>✅ I have <span class="right">something to tell</span> you. → 我有事要告诉你<br>✅ She has <span class="right">a lot of work to do</span>. → 她有很多工作要做<br>✅ Is there <span class="right">anything to eat</span>? → 有什么吃的吗？<br>✅ He needs <span class="right">a place to stay</span>. → 他需要住的地方<br><br>【常见搭配】<br>• something to do → 有事要做<br>• nothing to say → 没什么要说<br>• a lot to learn → 很多要学<br>• a plan to follow → 计划要遵循<br><br>【易错点】<br>❌ I have something <span class="wrong">for telling</span> you.<br>✅ I have something <span class="right">to tell</span> you.<br><br>【记忆口诀】<br>名词+to do = ...的（后置定语）<br>something to tell = 要告诉的事', tip:'名词+to do后置定语=something to tell/anything to eat' },

    // ===== 新增：unless =====
    { id:'g42', cat:'grammar', type:'choice', badge:'语法',
      q:'"I will not go ___ it is sunny." — 除非晴天我才去。填？', opts:['if','unless','whether','until'], ans:1,
      explain:'【知识点】unless = if not<br><br><span class="right">unless</span> = <span class="right">if not</span>（除非=如果不）<br><br>【转换规则】<br>unless + 正面条件 = if + 否定条件<br>✅ I will not go <span class="right">unless</span> it is sunny.<br>= I will not go <span class="right">if it is not</span> sunny.<br>= 除非晴天，否则不去<br><br>【更多例句】<br>✅ You cannot enter <span class="right">unless</span> you have a ticket.<br>= You cannot enter <span class="right">if you do not have</span> a ticket.<br><br>✅ I will call you <span class="right">unless</span> I am busy.<br>= I will call you <span class="right">if I am not</span> busy.<br><br>【易错点】<br>unless本身已含否定意义→不与not连用<br>❌ <span class="wrong">unless not</span> → 双重否定，不正确<br><br>【记忆口诀】<br>unless = if not<br>除非 = 如果不<br>unless本身含否定，不再加not', tip:'unless=if not(除非=如果不)' },

    // ===== 新增：面试表达更多 =====
    { id:'p23', cat:'phrase', type:'choice', badge:'搭配',
      q:'"skillful at" vs "skillful in" 区别？', opts:['前者技能类，后者学术/行业类','没有区别','前者学术类，后者技能类','都不正确'], ans:0,
      explain:'【知识点】skillful at vs skillful in<br><br><span class="right">skillful at</span> = 擅长（技能类：at negotiation / at cooking）<br><span class="right">skillful in</span> = 擅长（学术/行业类：in mathematics / in marketing）<br><br>【判断规则】<br>• 具体技能/动作 → <span class="right">at</span><br>• 学术领域/行业 → <span class="right">in</span><br><br>【例句对比】<br>✅ She is skillful <span class="right">at</span> negotiation. → 擅长谈判(技能)<br>✅ He is skillful <span class="right">in</span> mathematics. → 擅长数学(学术)<br><br>【面试关键词】<br>• well-suited → 非常适合(性格合拍)<br>• qualified → 有资格的(硬实力)<br>• competent → 有能力的(能力靠谱)<br>• capable → 能干的(潜力)<br>• a good fit → 合适(综合)<br><br>【记忆口诀】<br>skillful at → 具体技能<br>skillful in → 学术领域<br>at动作 in领域', tip:'skillful at技能 vs skillful in学术/行业' },
    { id:'p24', cat:'phrase', type:'choice', badge:'搭配',
      q:'面试中说"I am a good fit for this role"表示什么？', opts:['我不适合','我非常适合','我勉强适合','我要退出'], ans:1,
      explain:'【知识点】面试自我评价<br><br><span class="right">a good fit</span> = 非常合适（性格/能力与岗位匹配）<br><br>【面试自我评价梯度】<br>• a good fit → 合适（性格合拍，综合匹配）<br>• well-suited → 非常适合（正式说法）<br>• qualified → 有资格的（硬实力达标）<br>• competent → 有能力的（能力靠谱）<br>• capable → 能干的（有潜力）<br><br>【面试表达模板】<br>✅ I believe I am <span class="right">a good fit</span> for this role.<br>✅ I am <span class="right">well-suited</span> for this position.<br>✅ I am <span class="right">qualified</span> for this job.<br>✅ I am <span class="right">competent</span> in this area.<br><br>【面试常问问题】<br>• Why should we hire you?<br>• What are your strengths?<br>• What are your weaknesses?<br>• Where do you see yourself in 5 years?<br><br>【记忆口诀】<br>a good fit = 合适（综合匹配）<br>well-suited = 非常适合（正式）<br>qualified = 有资格（硬实力）', tip:'a good fit=综合合适, well-suited=非常适合, qualified=有资格' },

    // ===== 新增：at all =====
    { id:'g43', cat:'grammar', type:'choice', badge:'语法',
      q:'"I do not like spicy food ___ all." 填什么？', opts:['in','at','with','by'], ans:1,
      explain:'【知识点】at all = 一点也不<br><br><span class="right">not ... at all</span> = 一点也不、完全不<br><br>【用法规则】<br>at all 只用在否定句或疑问句<br>✅ I do not like spicy food <span class="right">at all</span>. → 一点也不喜欢辣食<br>✅ Do you like it <span class="right">at all</span>? → 你到底喜不喜欢？<br><br>【否定句搭配】<br>• not at all → 一点也不<br>• not ... in any way → 完全不<br>• not ... whatsoever → 一点也不<br><br>【肯定句不能用at all】<br>❌ I like it <span class="wrong">at all</span>. → 错！at all只配否定<br>✅ I like it <span class="right">very much</span>. → 正确<br><br>【记忆口诀】<br>not + at all = 一点也不<br>at all只配否定句和疑问句<br>肯定句用very much', tip:'not...at all=一点也不(只配否定句/疑问句)' },

    // ===== 新增：so...that =====
    { id:'g44', cat:'grammar', type:'choice', badge:'语法',
      q:'"The movie was ___ boring that I fell asleep." 填什么？', opts:['very','so','too','such'], ans:1,
      explain:'【知识点】so...that vs such...that<br><br><span class="right">so + 形容词/副词 + that</span> = 太…以至于…<br><span class="right">such + 名词(短语) + that</span> = 太…以至于…<br><br>【结构对比】<br>• so → 修饰<b>形容词/副词</b><br>✅ The movie was <span class="right">so</span> boring <span class="highlight">that</span> I fell asleep.<br><br>• such → 修饰<b>名词短语</b><br>✅ It was <span class="right">such</span> a boring movie <span class="highlight">that</span> I fell asleep.<br><br>【易错点】<br>❌ The movie was <span class="wrong">such</span> boring that I fell asleep.<br>→ such不能直接修饰形容词！<br><br>❌ It was <span class="wrong">so</span> a boring movie that I fell asleep.<br>→ so不能修饰名词短语！<br><br>【记忆口诀】<br>so + 形容词/副词 + that<br>such + 名词短语 + that<br>so修饰词，such修饰名词', tip:'so+形容词/副词+that vs such+名词短语+that' },

    // ===== 新增：have not / no 用法 =====
    { id:'g45', cat:'grammar', type:'choice', badge:'语法',
      q:'not和no的区别是什么？', opts:['not否定动词，no否定名词','not否定名词，no否定动词','两者完全一样','not用于句首，no用于句尾'], ans:0,
      explain:'【知识点】not vs no 的词性和用法<br><br><b>not</b> = 副词 → 只能否定<b>动词</b><br>✅ is <span class="right">not</span> / do <span class="right">not</span> / can <span class="right">not</span><br><br><b>no</b> = 形容词 → 直接修饰<b>名词</b><br>✅ <span class="right">no</span> friends / <span class="right">no</span> time / <span class="right">no</span> money<br><br>【关键区别】<br>• not放在动词前后 → I do <span class="right">not</span> know.<br>• no放在名词前面 → I have <span class="right">no</span> idea.<br><br>【错误用法】<br>❌ I have <span class="wrong">not</span> friends. → not不能修饰名词！<br>❌ He is <span class="wrong">no</span> happy. → no不能修饰形容词！<br><br>【记忆口诀】<br>not配动词（is not / do not）<br>no配名词（no time / no money）', tip:'not是副词否定动词，no是形容词否定名词' },

    { id:'g46', cat:'grammar', type:'choice', badge:'语法',
      q:'哪种表达是正确的？"他没有朋友"', opts:['He hasn\'t friends','He has no friends','He no has friends','He don\'t has friends'], ans:1,
      explain:'【知识点】have的否定形式<br><br>❌ <span class="wrong">He hasn\'t friends</span> → not不能直接否定名词！<br>❌ <span class="wrong">He no has friends</span> → no不能用在动词前！<br>❌ <span class="wrong">He don\'t has friends</span> → doesn\'t后用动词原形have！<br><br>✅ <span class="right">He has no friends.</span> → no+名词（最简洁）<br>✅ <span class="right">He hasn\'t got any friends.</span> → 英式<br>✅ <span class="right">He doesn\'t have any friends.</span> → 美式<br><br>【三种正确方式】<br>① no + 名词 → have <span class="right">no</span> friends<br>② haven\'t got + any + 名词 → <span class="right">haven\'t got any</span> friends<br>③ don\'t/doesn\'t have + any + 名词 → <span class="right">doesn\'t have any</span> friends<br><br>【记忆口诀】<br>have否定三选一：<br>have no X / haven\'t got any X / don\'t have any X', tip:'have否定：have no / haven\'t got any / don\'t have any' },

    { id:'g47', cat:'grammar', type:'choice', badge:'语法',
      q:'"I haven\'t ___ time." 填什么使其正确？', opts:['','any','no','some'], ans:1,
      explain:'【知识点】haven\'t got + any + 名词<br><br>❌ <span class="wrong">I haven\'t time.</span> → not不能直接否定名词time！<br>❌ <span class="wrong">I haven\'t no time.</span> → 双重否定！<br>❌ <span class="wrong">I haven\'t some time.</span> → some用于肯定句！<br><br>✅ <span class="right">I haven\'t got any time.</span> → 英式<br>✅ <span class="right">I don\'t have any time.</span> → 美式<br>✅ <span class="right">I have no time.</span> → 最简洁<br><br>【any的规则】<br>否定句和疑问句中用<b>any</b>，不用some<br>✅ I don\'t have <span class="right">any</span> time.<br>❌ I don\'t have <span class="wrong">some</span> time.<br><br>【记忆口诀】<br>haven\'t got + any + 名词<br>don\'t have + any + 名词<br>have + no + 名词', tip:'haven\'t got any + 名词(否定句用any不用some)' },

    // ===== 新增：辨析法官题目 =====
    { id:'e13', cat:'error', type:'judge', badge:'易错',

// ============ BOOKMARKS (localStorage) ============
let bookmarkedSet = new Set();
(function loadBookmarks() {
  try {
    var raw = localStorage.getItem('testmaster_bookmarks');
    if (raw) {
      var arr = JSON.parse(raw);
      for (var i = 0; i < arr.length; i++) bookmarkedSet.add(arr[i]);
    }
  } catch(e) {}
})();
function saveBookmarks() {
  try { localStorage.setItem('testmaster_bookmarks', JSON.stringify(Array.from(bookmarkedSet))); } catch(e) {}
}
window.toggleBookmark = function(id) {
  if (bookmarkedSet.has(id)) {
    bookmarkedSet.delete(id);
  } else {
    bookmarkedSet.add(id);
  }
  saveBookmarks();
  updateHomeStats();
  var bmBtn = document.getElementById('bmBtn');
  if (bmBtn) {
    bmBtn.textContent = bookmarkedSet.has(questions[qIndex]?.id) ? '⭐' : '☆';
    bmBtn.style.color = bookmarkedSet.has(questions[qIndex]?.id) ? '#F59E0B' : '#9CA3AF';
  }
};

// ============ FREQUENCY TRACKING (localStorage) ============
var freqState = {};
(function loadFreqState() {
  try {
    var raw = localStorage.getItem('testmaster_freq');
    if (raw) freqState = JSON.parse(raw);
  } catch(e) {}
})();
function saveFreqState() {
  try { localStorage.setItem('testmaster_freq', JSON.stringify(freqState)); } catch(e) {}
}
window.updateFreq = function(qId, isCorrect) {
  if (!freqState[qId]) freqState[qId] = { c: 0, w: 0, streak: 0 };
  if (isCorrect) {
    freqState[qId].c = (freqState[qId].c || 0) + 1;
    freqState[qId].streak = (freqState[qId].streak || 0) + 1;
  } else {
    freqState[qId].w = (freqState[qId].w || 0) + 1;
    freqState[qId].streak = 0;
  }
  saveFreqState();
};
function freqWeightedShuffle(arr) {
  if (!arr || arr.length === 0) return arr;
  var lowFreq = [];
  var normal = [];
  for (var i = 0; i < arr.length; i++) {
    var fs = freqState[arr[i].id];
    if (fs && fs.streak >= 5) { lowFreq.push(arr[i]); }
    else { normal.push(arr[i]); }
  }
  normal = shuffleArr(normal);
  lowFreq = shuffleArr(lowFreq);
  var result = [];
  var nIdx = 0, lIdx = 0;
  while (nIdx < normal.length || lIdx < lowFreq.length) {
    for (var j = 0; j < 4 && nIdx < normal.length; j++) { result.push(normal[nIdx++]); }
    if (lIdx < lowFreq.length) { result.push(lowFreq[lIdx++]); }
  }
  return result;
}
function freqBoostWrong(arr) {
  var boosted = [];
  for (var i = 0; i < arr.length; i++) {
    var fs = freqState[arr[i].id];
    boosted.push(arr[i]);
    if (fs && fs.w >= 2 && fs.streak < 2) { boosted.push(arr[i]); }
  }
  return boosted;
}
function shuffleArr(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

// ============ UTILS ============
function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function showToast(msg) {

  t.className = 'toast-msg';

function init() {
  const bar = document.getElementById('catBar');
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c.key === currentCat ? ' active' : '');

function updateHomeStats() {

  if(hMasterEl) hMasterEl.textContent = masteredSet.size;

// ============ START MODE ============
function startMode(mode) {
  currentMode = mode;
  const cfg = MODE_CFG[mode];
  lives = cfg.lives === 99 ? 999 : cfg.lives;
  timeLeft = cfg.timePer > 0 ? cfg.total * cfg.timePer : 0;

  // Build question list
  let pool = [];

  // Bookmark mode: filter by bookmarked IDs
  if (mode === 'bookmark') {
    var allCats = currentCat ? [currentCat] : Object.keys(Q);
    allCats.forEach(function(cat) {
      if (Q[cat]) {
        for (var bi = 0; bi < Q[cat].length; bi++) {
          if (bookmarkedSet.has(Q[cat][bi].id)) pool.push(Q[cat][bi]);
        }
      }
    });
    if (pool.length === 0) {
      showToast('还没有收藏任何题目！先在练习中点击 ☆ 收藏吧');
      return;
    }
    // Use all bookmarked questions (or limit to 99)
    pool = freqBoostWrong(pool);
    questions = freqWeightedShuffle(pool).slice(0, Math.min(pool.length, cfg.total));
  } else {
    let srcCats = currentCat ? [currentCat] : Object.keys(Q);
    srcCats.forEach(cat => { if(Q[cat]) pool = pool.concat(Q[cat]); });

    // Filter by mode type
    if(mode === 'speed') {
      // 极速闯关：15秒限时，排除长句听写
      pool = pool.filter(function(q) { return q.type !== 'sent-dict'; });
    }
    if(mode === 'fill') {
      // 填空听写：merge fill + type + sent-fill + sent-dict
      pool = pool.filter(function(q) { return q.type === 'fill' || q.type === 'type' || q.type === 'sent-fill' || q.type === 'sent-dict'; });
    }
    if(mode === 'judge') {
      // 辨析判断：merge judge + sent-app
      pool = pool.filter(function(q) { return q.type === 'judge' || q.type === 'sent-app'; });
    }
    // mixed mode: no filtering, all types from entire knowledge base

    if(pool.length < 3) {
      showToast('该范围题目太少，请选择更多类别！');
      return;
    }

    // Apply frequency boost for wrong questions
    pool = freqBoostWrong(pool);
    // Use frequency-weighted shuffle
    questions = freqWeightedShuffle(pool).slice(0, cfg.total);
  }

  qIndex = 0;
  results = [];
  answered = false;

  // Show test page
  showPage('test');
  renderQuestion();
  if(cfg.timePer > 0 && cfg.total <= 99) startTimer();
  else { document.getElementById('timerWrap').style.display='none'; document.getElementById('testTimer').textContent=''; }

  // Lives display
  const lr = document.getElementById('livesRow');
  if(cfg.lives !== 99) { lr.style.display='flex'; renderLives(); }
  else lr.style.display='none';
}

function renderLives() {
  const lr = document.getElementById('livesRow');
  lr.innerHTML = '';
  const realLives = Math.min(lives, 3);
  for(let i=0;i<3;i++) {
    const h = document.createElement('span');
    h.className = 'heart' + (i >= realLives ? ' lost' : '');
    h.textContent = '❤️';
    lr.appendChild(h);
  }
}

function startTimer() {
  const cfg = MODE_CFG[currentMode];
  timeLeft = cfg.total * cfg.timePer;
  document.getElementById('timerWrap').style.display='block';
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    const total = cfg.total * cfg.timePer;
    const pct = (timeLeft / total * 100);
    const fill = document.getElementById('timerFill');
    fill.style.width = pct + '%';
    fill.className = 'timer-fill' + (pct < 20 ? ' crit' : pct < 40 ? ' warn' : '');
    document.getElementById('testTimer').textContent = timeLeft + 's';
    if(timeLeft <= 0) { clearInterval(timerInterval); endTest(); }
  }, 1000);
}

// ============ RENDER QUESTION ============
function renderQuestion() {
  if(qIndex >= questions.length || lives <= 0) { endTest(); return; }
  answered = false;

  const q = questions[qIndex];
  const area = document.getElementById('qArea');
  const cfg = MODE_CFG[currentMode];

  // Info bar
  document.getElementById('testInfo').textContent = cfg.label + ' · 第 ' + (qIndex+1) + '/' + questions.length + ' 题';

  // Progress dots
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'p-dot' + (i < qIndex ? (results[i]?.skipped ? ' skip' : results[i]?.correct ? ' done' : ' fail') : '') + (i === qIndex ? ' current' : '');
    dots.appendChild(d);
  });

  // Badge
  const badgeClass = {
    '语法':'badge-grammar','词汇':'badge-vocab','搭配':'badge-phrase','场景':'badge-scene','易错':'badge-error',
    '句子听写':'badge-sent-dict','句子填空':'badge-sent-fill','句子应用':'badge-sent-app','句子':'badge-sentence'
  }[q.badge] || 'badge-grammar';

  let isBookmarked = bookmarkedSet.has(q.id);
  let bmClass = isBookmarked ? ' bookmarked' : '';
  let bmIcon = isBookmarked ? '⭐' : '☆';
  let html = `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;"><div class="q-type-badge ${badgeClass}">${q.badge}</div><button class="bm-btn${bmClass}" id="bmBtn" onclick="window.toggleBookmark('${q.id}')" title="${isBookmarked?'取消收藏':'收藏此题'}">${bmIcon} 收藏</button></div>`;

  if(q.type === 'choice' || q.type === 'sent-app') {
    html += `<div class="q-text">${q.q}</div>`;
    if(q.hint) html += `<div class="q-hint">${q.hint}</div>`;
    html += `<div class="opts-grid" id="optsGrid">`;
    q.opts.forEach((opt, i) => {
      html += `<div class="opt-btn" data-idx="${i}" onclick="handleChoice(${i})">${opt}</div>`;
    });
    html += `</div>`;
    html += `<div id="explainWrap"></div>`;
  } else if(q.type === 'fill') {
    html += `<div class="fill-wrap">`;
    html += `<div class="q-text">${q.q}</div>`;
    if(q.hint) html += `<div class="q-hint">${q.hint}</div>`;
    html += `<input class="fill-input" id="fillInput" placeholder="输入答案..." autocomplete="off">`;
    html += `<div id="explainWrap"></div>`;
    html += '<div style="text-align:center;margin-top:10px;"><button class="submit-btn" onclick="submitFill()">提交答案</button></div>';
    html += `</div>`;
  } else if(q.type === 'type') {
    html += `<div class="type-wrap">`;
    html += `<div class="type-prompt-big">${q.q}</div>`;
    html += `<div class="q-hint">输入对应的英文</div>`;
    html += `<input class="type-input" id="typeInput" placeholder="type here..." autocomplete="off">`;
    html += `<div id="explainWrap"></div>`;
    html += '<div style="text-align:center;margin-top:10px;"><button class="submit-btn" onclick="submitType()">提交答案</button></div>';
    html += `</div>`;
  } else if(q.type === 'judge') {
    html += `<div class="q-text">${q.q}</div>`;
    html += `<div class="opts-grid" style="grid-template-columns:1fr 1fr;">`;
    html += `<div class="opt-btn" onclick="handleJudge(true)" style="font-size:18px;font-weight:700;">✅ 正确</div>`;
    html += `<div class="opt-btn" onclick="handleJudge(false)" style="font-size:18px;font-weight:700;">❌ 错误</div>`;
    html += `</div>`;
    html += `<div id="explainWrap"></div>`;
  } else if(q.type === 'sent-dict') {
    html += `<div class="type-wrap">`;
    html += `<div style="font-size:20px;font-weight:700;color:var(--gray-800);margin-bottom:8px;line-height:1.5;">${q.q}</div>`;
    html += `<div class="q-hint">请输入对应的英文句子</div>`;
    html += `<textarea id="typeInput" class="type-input" style="height:80px;text-align:left;font-size:15px;resize:vertical;" placeholder="在此输入英文..." autocomplete="off"></textarea>`;
    html += `<div id="explainWrap"></div>`;
    html += '<div style="text-align:center;margin-top:10px;"><button class="submit-btn" onclick="submitSentDict()">提交答案</button></div>';
    html += `</div>`;
  } else if(q.type === 'sent-fill') {
    html += `<div class="fill-wrap">`;
    html += `<div style="font-size:18px;font-weight:600;color:var(--gray-800);margin-bottom:12px;line-height:1.6;">${q.q}</div>`;
    if(q.hint) html += `<div class="q-hint">${q.hint}</div>`;
    html += `<input class="fill-input" id="fillInput" placeholder="输入缺失的单词..." autocomplete="off">`;
    html += `<div id="explainWrap"></div>`;
    html += '<div style="text-align:center;margin-top:10px;"><button class="submit-btn" onclick="submitSentFill()">提交答案</button></div>';
    html += `</div>`;
  }

  area.innerHTML = html;

  // Auto focus
  setTimeout(() => {
    const inp = document.getElementById('fillInput') || document.getElementById('typeInput');
    if(inp) inp.focus();
  }, 100);

  // Keyboard handler: Enter submits for all input types
  if(q.type === 'fill' || q.type === 'type' || q.type === 'sent-dict' || q.type === 'sent-fill') {
    const inp = document.getElementById('fillInput') || document.getElementById('typeInput');
    if(inp) {
      inp.addEventListener('keydown', e => {
        if(e.key === 'Enter' && !answered) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          // Block all nextQuestion calls for 400ms
          _lastSubmit = Date.now();
          if(q.type === 'fill') submitFill();
          else if(q.type === 'type') submitType();
          else if(q.type === 'sent-dict') submitSentDict();
          else if(q.type === 'sent-fill') submitSentFill();
        }
      });
    }
  }
}

// ============ ANSWER HANDLERS ============
function handleChoice(idx) {
  if(answered) return;
  answered = true;
  const q = questions[qIndex];
  const isCorrect = idx === q.ans;
  const opts = document.querySelectorAll('#optsGrid .opt-btn');

  opts.forEach((btn, i) => {
    if(i === q.ans) btn.classList.add('correct');
    else if(i === idx && !isCorrect) btn.classList.add('wrong');
  });

  if(isCorrect) {
    addScore(10 + currentCombo * 2);
    addCombo();
    markMastered(q.id);
    results.push({ id:q.id, correct:true, userAns:q.opts[idx] });
    window.updateFreq(q.id, true);
  } else {
    resetCombo();
    results.push({ id:q.id, correct:false, userAns:q.opts[idx] });
    window.updateFreq(q.id, false);
    if(currentMode === 'survival') { lives--; renderLives(); }
  }
  showExplain(q, isCorrect, q.opts[idx]);
}

function handleJudge(val) {
  if(answered) return;
  answered = true;
  const q = questions[qIndex];
  const isCorrect = val === q.ans;
  const opts = document.querySelectorAll('.opt-btn');
  opts.forEach(btn => {
    const isTrueOpt = btn.textContent.includes('✅');
    if(isTrueOpt && q.ans) btn.classList.add('correct');
    else if(!isTrueOpt && !q.ans) btn.classList.add('correct');
    if(isTrueOpt && !q.ans && val) btn.classList.add('wrong');
    if(!isTrueOpt && q.ans && !val) btn.classList.add('wrong');
  });

  if(isCorrect) {
    addScore(10 + currentCombo * 2);
    addCombo();
    markMastered(q.id);
    results.push({ id:q.id, correct:true, userAns:val ? '✅' : '❌' });
    window.updateFreq(q.id, true);
  } else {
    resetCombo();
    results.push({ id:q.id, correct:false, userAns:val ? '✅' : '❌' });
    window.updateFreq(q.id, false);
    if(currentMode === 'survival') { lives--; renderLives(); }
  }
  showExplain(q, isCorrect, val ? '✅' : '❌');
}

// ============ FILL / TYPE SUBMIT ============
function submitFill() {
  if(answered) return;
  const q = questions[qIndex];
  const inp = document.getElementById('fillInput');
  if(!inp) return;
  const val = inp.value.trim().toLowerCase();
  if(!val) return; // 空答案不允许提交
  answered = true;
  const correctAns = q.ans.map(a => a.toLowerCase());
  const isCorrect = correctAns.some(a => val === a);
  inp.className = 'fill-input ' + (isCorrect ? 'correct' : 'wrong');
  inp.disabled = true;
  if(isCorrect) {
    addScore(15 + currentCombo * 3);
    addCombo();
    markMastered(q.id);
    results.push({ id:q.id, correct:true, userAns:val });
    window.updateFreq(q.id, true);
  } else {
    resetCombo();
    results.push({ id:q.id, correct:false, userAns:val });
    window.updateFreq(q.id, false);
    if(currentMode === 'survival' || currentMode === 'speed') { lives--; renderLives(); }
  }
  showExplain(q, isCorrect, val);
}

function submitType() {
  if(answered) return;
  const q = questions[qIndex];
  const inp = document.getElementById('typeInput');
  if(!inp) return;
  const val = inp.value.trim().toLowerCase();
  if(!val) return; // 空答案不允许提交
  answered = true;
  const correctAns = q.ans.map(a => a.toLowerCase());
  const isCorrect = correctAns.some(a => val === a);
  inp.className = 'type-input ' + (isCorrect ? 'correct' : 'wrong');
  inp.disabled = true;
  if(isCorrect) {
    addScore(15 + currentCombo * 3);
    addCombo();
    markMastered(q.id);
    results.push({ id:q.id, correct:true, userAns:val });
    window.updateFreq(q.id, true);
  } else {
    resetCombo();
    results.push({ id:q.id, correct:false, userAns:val });
    window.updateFreq(q.id, false);
    if(currentMode === 'survival' || currentMode === 'speed') { lives--; renderLives(); }
  }
  showExplain(q, isCorrect, val);
}

// ============ EXPLAIN ============
function showExplain(q, isCorrect, userAns) {
  // Hide submit button fully
  var sb = document.querySelector('.submit-btn');
  if(sb) { sb.style.display = 'none'; if(sb.parentNode) sb.parentNode.style.display = 'none'; }

  const wrap = document.getElementById('explainWrap');
  // Determine the correct answer display for wrong answers
  let correctAnswerHtml = '';
  if(!isCorrect) {
    let correctDisplay = '';
    if(q.type === 'choice') {
      correctDisplay = q.opts[q.ans];
    } else if(q.type === 'judge') {
      correctDisplay = q.ans ? '✅ 正确' : '❌ 错误';
    } else if(q.type === 'fill' || q.type === 'type') {
      correctDisplay = q.ans.join(' / ');
    } else if(q.type === 'sent-dict' || q.type === 'sent-fill') {
      correctDisplay = q.ans[0];
    }
    correctAnswerHtml = `<div style="background:var(--success-light);padding:8px 12px;border-radius:8px;margin-bottom:8px;font-weight:600;color:var(--success);">✅ 正确答案：${correctDisplay}</div>`;
  }
  let html = `<div class="explain-box">`;
  html += correctAnswerHtml;
  html += `<div class="explain-title">${isCorrect ? '✅ 答对了！' : '❌ 答错了'} 解析：</div>`;
  html += `<div class="explain-body">${q.explain}</div>`;
  if(q.tip) html += `<div class="explain-tip">${q.tip}</div>`;
  html += `</div>`;
  html += `<div class="next-btn-wrap">`;
  html += `<button class="next-btn" id="nextBtn">${lives <= 0 ? '查看结果' : '下一题 →'}</button>`;
  html += `</div>`;
  wrap.innerHTML = html;

  // Bind next button directly
  var nextBtn = document.getElementById('nextBtn');
  if (nextBtn) {
    nextBtn.onclick = function() {
      if (lives <= 0) endTest();
      else nextQuestion();
    };
  }

  // Guard: block nextQuestion for 300ms after submitting (prevents Enter key double-fire)
  _lastSubmit = Date.now();
}

function nextQuestion() {
  if (Date.now() - _lastSubmit < 300) return; // debounce guard
  qIndex++;
  if(qIndex >= questions.length || lives <= 0) endTest();
  else renderQuestion();
}

// ====== SKIP QUESTION ======
var skipQuestion = window.skipQuestion = function() {
  if(answered) return;
  answered = true;
  if (!questions || qIndex >= questions.length) { endTest(); return; }
  var q = questions[qIndex];
  if (!q) { endTest(); return; }
  results.push({ id:q.id, correct:false, userAns:'（已跳过）', skipped:true });
  qIndex++;
  if(qIndex >= questions.length || lives <= 0) endTest();
  else renderQuestion();
};


// ====== SENTENCE DICTATION SUBMIT ======
function submitSentDict() {
  if(answered) return;
  var q = questions[qIndex];
  var input = document.getElementById('typeInput');
  if (!input) return;
  var userAns = input.value.trim();
  if(!userAns) return; // 空答案不允许提交

  answered = true;
  var correctAns = q.ans[0];
  var isCorrect = normalizeSent(userAns) === normalizeSent(correctAns);

  if(isCorrect) {
    input.className = 'type-input correct';
    addScore(10);
    addCombo();
    markMastered(q.id);
  } else {
    input.className = 'type-input wrong';
    addScore(-3);
    resetCombo();
    input.value = '';
    input.placeholder = '✅ 正确: ' + correctAns;
    if(currentMode === 'survival' || currentMode === 'speed') { lives--; renderLives(); }
  }
  input.disabled = true;
  results.push({ id:q.id, correct:isCorrect, userAns:userAns });
  window.updateFreq(q.id, isCorrect);

  showExplain(q, isCorrect, userAns);
}

// ====== SENTENCE FILL-BLANK SUBMIT ======
function submitSentFill() {
  if(answered) return;
  var q = questions[qIndex];
  var input = document.getElementById('fillInput');
  if (!input) return;
  var userAns = input.value.trim();
  if(!userAns) return; // 空答案不允许提交

  answered = true;
  var correctAns = q.ans[0];
  var isCorrect = normalizeWord(userAns) === normalizeWord(correctAns);

  if(isCorrect) {
    input.className = 'fill-input correct';
    addScore(10);
    addCombo();
    markMastered(q.id);
  } else {
    input.className = 'fill-input wrong';
    addScore(-3);
    resetCombo();
    input.value = '';
    input.placeholder = '✅ 正确: ' + correctAns;
    if(currentMode === 'survival' || currentMode === 'speed') { lives--; renderLives(); }
  }
  input.disabled = true;
  results.push({ id:q.id, correct:isCorrect, userAns:userAns });
  window.updateFreq(q.id, isCorrect);

  // Hide submit button
  showExplain(q, isCorrect, userAns);
}

// ====== NORMALIZATION HELPERS ======
function normalizeSent(s) {
  // Remove punctuation, extra spaces, lowercase
  return s.replace(/[.,!?;:'"()\-]/g, ' ').replace(/\s+/g, ' ').trim().toLowerCase();
}
function normalizeWord(s) {
  return s.replace(/[.,!?;:'"()]/g, '').trim().toLowerCase();
}

// ============ SCORE / COMBO ============
function addScore(pts) {
  totalScore += pts;
  const el = document.createElement('div');
  el.className = 'score-float';
  el.style.left = '50%'; el.style.top = '30%';
  el.style.color = pts > 0 ? '#10B981' : '#EF4444';
  el.textContent = '+' + pts;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function addCombo() {
  currentCombo++;
  if(currentCombo > maxCombo) maxCombo = currentCombo;
  if(currentCombo >= 3 && currentCombo % 3 === 0) {
    const el = document.getElementById('comboPop');
    el.textContent = currentCombo + '连击!';
    el.className = 'combo-pop';
    void el.offsetWidth;
    el.className = 'combo-pop show';
  }
}

function resetCombo() { currentCombo = 0; }
function markMastered(id) { masteredSet.add(id); }

// ============ END TEST ============
function endTest() {
  clearInterval(timerInterval);
  const correct = results.filter(r => r.correct).length;
  const wrong = results.filter(r => !r.correct && !r.skipped).length;
  const skipped = results.filter(r => r.skipped).length;
  const total = questions.length;
  const attempted = correct + wrong;
  const pct = attempted > 0 ? Math.round(correct / attempted * 100) : 0;

  let emoji, grade;
  if(pct >= 90) { emoji='🥇'; grade='大师级'; }
  else if(pct >= 70) { emoji='🥈'; grade='不错哦'; }
  else if(pct >= 50) { emoji='🥉'; grade='继续加油'; }
  else { emoji='💪'; grade='再练练'; }

  // Weak points (wrong only, not skipped)
  const weakItems = results.filter(r => !r.correct && !r.skipped);
  let weakHtml = '';
  if(weakItems.length > 0) {
    weakHtml = `<div class="weak-section">
      <div class="weak-title">⚠️ 需要加强的知识点（${weakItems.length}个）</div>
      <div class="weak-list">`;
    weakItems.forEach(r => {
      const q = questions.find(qq => qq.id === r.id);
      if(q) {
        let correctDisplay = '';
        if(q.type === 'choice' || q.type === 'sent-app') {
          correctDisplay = q.opts[q.ans];
        } else if(q.type === 'judge') {
          correctDisplay = q.ans ? '✅ 正确' : '❌ 错误';
        } else if(q.type === 'fill' || q.type === 'type' || q.type === 'sent-fill' || q.type === 'sent-dict') {
          correctDisplay = q.ans.join(' / ');
        }
        weakHtml += `<div style="margin-bottom:6px;padding:8px 8px;background:var(--danger-light);border-radius:6px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="flex:1;">
              <span class="en">${q.q}</span><br><span style="color:var(--danger)">你的答案：${r.userAns}</span><br><span style="color:var(--success)">✅ 正确答案：${correctDisplay}</span>
            </div>
            <button class="bm-btn${bookmarkedSet.has(q.id)?' bookmarked':''}" onclick="window.toggleBookmark('${q.id}');this.textContent=window.bookmarkedSet.has('${q.id}')?'⭐':'☆';this.className='bm-btn'+(window.bookmarkedSet.has('${q.id}')?' bookmarked':'');" style="flex-shrink:0;font-size:14px;padding:4px 10px;">${bookmarkedSet.has(q.id)?'⭐':'☆'}</button>
          </div>
        </div>`;
      }
    });
    weakHtml += `</div></div>`;
  }

  // Skipped section
  const skippedItems = results.filter(r => r.skipped);
  if(skippedItems.length > 0) {
    weakHtml += `<div class="weak-section" style="margin-top:12px;">
      <div class="weak-title" style="background:#FEF3C7;color:#92400E;">⏭️ 已跳过的题目（${skippedItems.length}个）</div>
      <div class="weak-list">`;
    skippedItems.forEach(r => {
      const q = questions.find(qq => qq.id === r.id);
      if(q) {
        let correctDisplay = '';
        if(q.type === 'choice' || q.type === 'sent-app') {
          correctDisplay = q.opts[q.ans];
        } else if(q.type === 'judge') {
          correctDisplay = q.ans ? '✅ 正确' : '❌ 错误';
        } else if(q.type === 'fill' || q.type === 'type' || q.type === 'sent-fill' || q.type === 'sent-dict') {
          correctDisplay = q.ans.join(' / ');
        }
        weakHtml += `<div style="margin-bottom:6px;padding:8px 8px;background:#FEF3C7;border-radius:6px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="flex:1;">
              <span class="en">${q.q}</span><br><span style="color:var(--success)">✅ 正确答案：${correctDisplay}</span>
            </div>
            <button class="bm-btn${bookmarkedSet.has(q.id)?' bookmarked':''}" onclick="window.toggleBookmark('${q.id}');this.textContent=window.bookmarkedSet.has('${q.id}')?'⭐':'☆';this.className='bm-btn'+(window.bookmarkedSet.has('${q.id}')?' bookmarked':'');" style="flex-shrink:0;font-size:14px;padding:4px 10px;">${bookmarkedSet.has(q.id)?'⭐':'☆'}</button>
          </div>
        </div>`;
      }
    });
    weakHtml += `</div></div>`;
  }

  const card = document.getElementById('resultCard');
  card.innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${pct}%</div>
    <div class="result-label">${grade}</div>
    <div class="result-grid">
      <div class="result-item"><div class="num" style="color:var(--success)">${correct}</div><div class="label">✅ 正确</div></div>
      <div class="result-item"><div class="num" style="color:var(--danger)">${wrong}</div><div class="label">❌ 错误</div></div>
      <div class="result-item"><div class="num" style="color:#F59E0B">${skipped}</div><div class="label">⏭️ 跳过</div></div>
      <div class="result-item"><div class="num" style="color:var(--accent)">${maxCombo}</div><div class="label">🔥 最高连击</div></div>
    </div>
    ${weakHtml}
    <div class="result-btns">
      <button class="btn-primary" onclick="startMode('${currentMode}')">再来一次</button>
      <button class="btn-outline" onclick="goHome()">返回首页</button>
    </div>
  `;

  showPage('result');
  updateHomeStats();
}

function shuffle(arr) {
  for(let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

      if (testPage) {
        var topBar = testPage.querySelector('.test-top-bar');
        if (topBar) topBar.parentNode.insertBefore(banner, topBar);
        else testPage.insertBefore(banner, testPage.firstChild);
      }
    }
  }
})();

// ============ 全局回车键 ============
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  // 如果焦点在输入框，让输入框先处理 Enter
  var activeEl = document.activeElement;
  if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
    return;
  }
  // 在测试页面，如果已回答，按回车 = 下一题
  var testPage = document.getElementById('testPage');
  if (testPage && testPage.style.display !== 'none' && answered) {
    if (Date.now() - _lastSubmit < 400) return; // debounce guard
    nextQuestion();
    return;
  }
  // 在结果页面，按回车 = 再来一次
  var resultPage = document.getElementById('resultPage');
  if (resultPage && resultPage.className.indexOf('active') !== -1) {
    startMode(currentMode);
    return;
  }
});
</script>
</body>
</html>
