<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>词汇拼写训练营</title>
<style>
  :root {
    --primary:#6366F1; --primary-light:#EEF2FF; --primary-dark:#4F46E5;
    --success:#10B981; --success-light:#ECFDF5;
    --danger:#EF4444; --danger-light:#FEF2F2;
    --accent:#F59E0B; --accent-light:#FFFBEB;
    --purple:#8B5CF6; --purple-light:#F5F3FF;
    --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
    --gray-300:#D1D5DB; --gray-500:#6B7280; --gray-600:#4B5563;
    --gray-700:#374151; --gray-800:#1F2937;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
    background:linear-gradient(135deg,#6366F1 0%,#8B5CF6 50%,#A855F7 100%);
    min-height:100vh;color:var(--gray-800);overflow-x:hidden;
  }

  /* ===== 首页 ===== */
  .home-page{display:flex;flex-direction:column;min-height:100vh;overflow-y:auto;}
  .home-hero{text-align:center;padding:36px 20px 16px;color:white;}
  .home-hero h1{font-size:26px;font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,0.2);}
  .home-hero p{font-size:13px;opacity:0.8;margin-top:6px;}

  .home-stats{display:flex;justify-content:center;gap:24px;padding:10px 20px;color:white;}
  .home-stat{text-align:center;}
  .home-stat-icon{font-size:22px;}
  .home-stat-val{font-size:18px;font-weight:700;}
  .home-stat-label{font-size:11px;opacity:0.7;}

  /* 模式选择 */
  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:16px 16px;max-width:500px;margin:0 auto;}
  .mode-card{
    background:white;border-radius:var(--radius);padding:16px 12px;
    box-shadow:0 4px 16px rgba(0,0,0,0.12);cursor:pointer;transition:all 0.2s;text-align:center;
    touch-action:manipulation;user-select:none;
  }
  .mode-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.18);}
  .mode-card:active{transform:translateY(-1px);}
  .mode-card-icon{font-size:30px;margin-bottom:4px;}
  .mode-card-title{font-size:14px;font-weight:700;}
  .mode-card-desc{font-size:11px;color:var(--gray-500);margin-top:3px;}

  /* 分类选择 */
  .cat-section{padding:12px 16px 20px;max-width:500px;margin:0 auto;}
  .cat-label{font-size:13px;color:rgba(255,255,255,0.7);font-weight:600;margin-bottom:8px;}
  .cat-bar{display:flex;flex-wrap:wrap;gap:6px;}
  .cat-btn{
    padding:7px 14px;border-radius:18px;border:1.5px solid rgba(255,255,255,0.35);
    background:rgba(255,255,255,0.12);color:white;font-size:12px;
    cursor:pointer;transition:all 0.2s;font-weight:500;
    touch-action:manipulation;user-select:none;
  }
  .cat-btn:hover{background:rgba(255,255,255,0.25);}
  .cat-btn.active{background:white;color:var(--primary);border-color:white;}

  /* ===== 练习页面 ===== */
  .practice-page{display:none;min-height:100vh;}
  .practice-page.active{display:flex;flex-direction:column;}

  .practice-top{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;background:rgba(255,255,255,0.1);color:white;
  }
  .practice-back{
    background:rgba(255,255,255,0.2);border:none;color:white;
    padding:8px 14px;border-radius:20px;font-size:13px;cursor:pointer;
    touch-action:manipulation;user-select:none;
  }
  .practice-back:hover{background:rgba(255,255,255,0.3);}
  .practice-info{font-size:14px;font-weight:600;}

  .progress-bar{padding:4px 16px;}
  .progress-track{width:100%;height:6px;background:rgba(255,255,255,0.2);border-radius:3px;}
  .progress-fill{height:100%;border-radius:3px;background:white;transition:width 0.3s;}

  /* 题目区 */
  .q-area{
    background:white;border-radius:20px 20px 0 0;
    padding:20px 16px;flex:1;margin-top:8px;
    box-shadow:0 -4px 20px rgba(0,0,0,0.08);
    overflow-y:auto;
  }

  .q-prompt{font-size:18px;font-weight:700;margin-bottom:6px;line-height:1.5;}
  .q-sub{font-size:13px;color:var(--gray-500);margin-bottom:14px;}

  /* 模式1：看英文猜中文 - 选择题 */
  .opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .opt-btn{
    padding:14px 12px;border-radius:12px;border:2px solid var(--gray-200);
    background:white;font-size:14px;cursor:pointer;transition:all 0.2s;
    font-weight:500;text-align:center;line-height:1.4;
    touch-action:manipulation;user-select:none;
  }
  .opt-btn:hover{border-color:var(--primary);background:var(--primary-light);}
  .opt-btn.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary);}
  .opt-btn.correct{border-color:var(--success);background:var(--success-light);color:#065F46;animation:pop 0.3s;}
  .opt-btn.wrong{border-color:var(--danger);background:var(--danger-light);color:#991B1B;animation:shake 0.4s;}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  /* 模式2：看中文拼英文 - 拼写区 */
  .spell-section{margin-bottom:16px;}
  .spell-prompt{font-size:18px;font-weight:700;margin-bottom:4px;}
  .spell-hint{font-size:13px;color:var(--gray-500);margin-bottom:10px;}
  .spell-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .spell-input{
    flex:1;min-width:120px;padding:12px 14px;border-radius:12px;
    border:2px solid var(--gray-200);font-size:16px;font-weight:600;
    outline:none;transition:all 0.2s;
    touch-action:manipulation;
  }
  .spell-input:focus{border-color:var(--primary);}
  .spell-input.correct{border-color:var(--success);background:var(--success-light);}
  .spell-input.wrong{border-color:var(--danger);background:var(--danger-light);}
  .spell-submit{
    padding:12px 20px;border-radius:12px;border:none;
    background:var(--primary);color:white;font-size:14px;font-weight:600;
    cursor:pointer;touch-action:manipulation;user-select:none;
  }
  .spell-submit:hover{background:var(--primary-dark);}
  .spell-show{
    padding:10px 16px;border-radius:12px;border:2px solid var(--gray-200);
    background:white;font-size:12px;cursor:pointer;touch-action:manipulation;
    user-select:none;color:var(--gray-600);
  }
  .spell-show:hover{border-color:var(--accent);color:var(--accent);}

  /* 音标展示 */
  .phonetic{font-size:14px;color:var(--purple);font-weight:500;margin-bottom:4px;}

  /* 拼写练习区（在解析中） */
  .spell-practice{
    background:var(--primary-light);border-radius:12px;padding:14px 16px;margin-top:12px;
  }
  .spell-practice-title{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:8px;}
  .spell-practice-row{
    display:flex;gap:6px;align-items:center;margin-bottom:8px;
  }
  .spell-practice-word{font-size:13px;font-weight:600;color:var(--gray-700);min-width:60px;}
  .spell-practice-input{
    flex:1;padding:8px 10px;border-radius:8px;border:1.5px solid var(--gray-300);
    font-size:14px;outline:none;transition:all 0.2s;
    touch-action:manipulation;
  }
  .spell-practice-input:focus{border-color:var(--primary);}
  .spell-practice-input.correct{border-color:var(--success);background:var(--success-light);}
  .spell-practice-input.wrong{border-color:var(--danger);background:var(--danger-light);}
  .spell-practice-btn{
    padding:6px 10px;border-radius:8px;border:none;
    background:var(--primary);color:white;font-size:11px;
    cursor:pointer;touch-action:manipulation;user-select:none;
  }
  .spell-practice-result{font-size:12px;font-weight:600;margin-left:4px;}

  /* 解析区 */
  .explain-area{
    margin-top:14px;padding:16px;border-radius:12px;
    background:var(--gray-50);border:1px solid var(--gray-200);
    display:none;
  }
  .explain-area.show{display:block;animation:fadeIn 0.3s;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  .explain-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:10px;}

  /* 所有选项含义 */
  .opts-meanings{margin-bottom:12px;}
  .opts-meaning-item{
    display:flex;align-items:center;gap:8px;padding:6px 0;
    font-size:13px;line-height:1.4;
  }
  .opts-meaning-word{font-weight:700;min-width:80px;}
  .opts-meaning-cn{color:var(--gray-600);}
  .opts-meaning-correct .opts-meaning-word{color:var(--success);}
  .opts-meaning-correct .opts-meaning-cn{color:var(--success);}
  .opts-meaning-wrong .opts-meaning-word{color:var(--danger);}
  .opts-meaning-selected .opts-meaning-word{color:var(--danger);}
  .opts-meaning-selected .opts-meaning-cn{color:var(--danger);}

  .explain-content{font-size:13px;line-height:1.6;color:var(--gray-700);}
  .en{color:var(--primary);font-weight:600;font-style:italic;}
  .right{color:var(--success);font-weight:600;}
  .wrong{color:var(--danger);font-weight:600;}
  .highlight{color:var(--accent);font-weight:700;}

  /* 下一题按钮 */
  .next-btn{
    display:block;width:100%;padding:14px;border-radius:12px;border:none;
    background:var(--primary);color:white;font-size:15px;font-weight:700;
    cursor:pointer;margin-top:14px;
    touch-action:manipulation;user-select:none;
  }
  .next-btn:hover{background:var(--primary-dark);}

  /* ===== 结果页 ===== */
  .result-page{display:none;min-height:100vh;padding:40px 20px;text-align:center;}
  .result-page.active{display:flex;flex-direction:column;align-items:center;}
  .result-icon{font-size:64px;margin-bottom:12px;}
  .result-title{font-size:24px;font-weight:800;color:white;margin-bottom:6px;}
  .result-score{font-size:48px;font-weight:800;color:white;margin:10px 0;}
  .result-detail{
    background:white;border-radius:var(--radius);padding:20px;margin-top:20px;
    width:100%;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,0.12);
  }
  .result-row{display:flex;justify-content:space-between;padding:8px 0;font-size:14px;}
  .result-row-label{color:var(--gray-500);}
  .result-row-val{font-weight:700;}
  .result-back{
    display:block;width:100%;max-width:400px;padding:14px;border-radius:12px;
    border:none;background:white;color:var(--primary);font-size:15px;font-weight:700;
    cursor:pointer;margin-top:16px;
    touch-action:manipulation;user-select:none;
  }

  /* toast */
  .toast-msg{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.75);color:white;padding:12px 24px;
    border-radius:12px;font-size:14px;font-weight:600;z-index:999;
    animation:toastIn 0.3s;
  }
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(0.8)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

  /* 响应式 */
  @media(max-width:400px){
    .home-hero h1{font-size:22px;}
    .mode-card{padding:14px 10px;}
    .q-prompt{font-size:16px;}
    .opts-grid{grid-template-columns:1fr;}
    .opt-btn{padding:12px 10px;font-size:13px;}
  }
</style>
</head>
<body>
<a href="index.html" style="display:inline-block;margin:8px 16px;padding:6px 14px;background:#10B981;color:white;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;">← 返回首页</a>

<!-- ===== 首页 ===== -->
<div class="home-page" id="homePage">
  <div class="home-hero">
    <h1>📝 词汇拼写训练营</h1>
    <p>看词猜义 · 拼写练习 · 全选项解析</p>
  </div>

  <div class="home-stats">
    <div class="home-stat">
      <div class="home-stat-icon">⭐</div>
      <div class="home-stat-val" id="hScore">0</div>
      <div class="home-stat-label">总分</div>
    </div>
    <div class="home-stat">
      <div class="home-stat-icon">🔥</div>
      <div class="home-stat-val" id="hCombo">0</div>
      <div class="home-stat-label">最高连击</div>
    </div>
    <div class="home-stat">
      <div class="home-stat-icon">✅</div>
      <div class="home-stat-val" id="hMaster">0</div>
      <div class="home-stat-label">已掌握</div>
    </div>
  </div>

  <!-- 模式选择 -->
  <div class="mode-grid">
    <div class="mode-card" onclick="startPractice('en2cn')">
      <div class="mode-card-icon">🇬🇧→🇨🇳</div>
      <div class="mode-card-title">看英文猜中文</div>
      <div class="mode-card-desc">看单词选含义，练阅读</div>
    </div>
    <div class="mode-card" onclick="startPractice('cn2en')">
      <div class="mode-card-icon">🇨🇳→🇬🇧</div>
      <div class="mode-card-title">看中文拼英文</div>
      <div class="mode-card-desc">看中文拼写单词，练输出</div>
    </div>
    <div class="mode-card" onclick="startPractice('mix')">
      <div class="mode-card-icon">🔄</div>
      <div class="mode-card-title">混合闯关</div>
      <div class="mode-card-desc">两种模式随机切换</div>
    </div>
    <div class="mode-card" onclick="startPractice('spellall')">
      <div class="mode-card-icon">✍️</div>
      <div class="mode-card-title">拼写全练</div>
      <div class="mode-card-desc">全部单词逐个拼写</div>
    </div>
  </div>

  <!-- 分类选择 -->
  <div class="cat-section">
    <div class="cat-label">选择主题</div>
    <div class="cat-bar" id="catBar"></div>
  </div>
</div>

<!-- ===== 练习页面 ===== -->
<div class="practice-page" id="practicePage">
  <div class="practice-top">
    <button class="practice-back" onclick="goHome()">← 返回</button>
    <div class="practice-info" id="pInfo">1 / 15</div>
  </div>
  <div class="progress-bar">
    <div class="progress-track">
      <div class="progress-fill" id="pFill"></div>
    </div>
  </div>
  <div class="q-area" id="qArea"></div>
</div>

<!-- ===== 结果页 ===== -->
<div class="result-page" id="resultPage">
  <div class="result-icon" id="rIcon">🎉</div>
  <div class="result-title" id="rTitle">练习完成</div>
  <div class="result-score" id="rScore">0</div>
  <div class="result-detail" id="rDetail"></div>
  <button class="result-back" onclick="goHome()">返回首页</button>
</div>

<script>
// ====== 词库数据 ======
// 每个词包含：英文、中文、音标、主题、选择题选项（含所有选项的英文含义）
const WORDS = [
  // 租房
  { en:'furnished', cn:'带家具的', ph:'/ˈfɜːrnɪʃd/', topic:'租房',
    opts:[{cn:'带家具的',en:'furnished'},{cn:'押金',en:'deposit'},{cn:'前台(人)',en:'receptionist'},{cn:'设施',en:'facility'}],
    explain:'【知识点】furnished vs unfurnished<br>furnished = 带家具的（租房核心词）<br>反义词：unfurnished = 不带家具的<br><br>【易错点】不说"It has furniture"，要说"Is it furnished?"<br>【记忆口诀】furnished = 带"furniture"的' },
  { en:'deposit', cn:'押金', ph:'/dɪˈpɒzɪt/', topic:'租房',
    opts:[{cn:'押金',en:'deposit'},{cn:'定金/首付',en:'down payment'},{cn:'退款',en:'refund'},{cn:'收据',en:'receipt'}],
    explain:'【知识点】deposit的多义<br>deposit = 押金（租房）或存款（银行）<br>≠ down payment = 定金/首付（买房，不退还）<br><br>【记忆口诀】租房押金→deposit，买房定金→down payment' },
  { en:'receptionist', cn:'前台(人)', ph:'/rɪˈsepʃənɪst/', topic:'租房',
    opts:[{cn:'前台(人)',en:'receptionist'},{cn:'前台(地方)',en:'reception'},{cn:'房东',en:'landlord'},{cn:'租客',en:'tenant'}],
    explain:'【知识点】receptionist vs reception<br>receptionist = 前台<strong>人</strong>（-ist结尾=人）<br>reception = 前台<strong>地点</strong><br><br>【记忆口诀】-ist=人，没有-ist=地点' },
  { en:'facility', cn:'设施', ph:'/fəˈsɪlɪti/', topic:'租房',
    opts:[{cn:'设施',en:'facility/facilities'},{cn:'家具',en:'furniture'},{cn:'押金',en:'deposit'},{cn:'水电费',en:'utilities'}],
    explain:'【知识点】facility常用复数<br>facility → facilities（常用复数）<br>因为设施通常不止一个<br>【记忆口诀】问设施→What facilities?' },
  // 运动
  { en:'cardio', cn:'有氧运动', ph:'/ˈkɑːrdioʊ/', topic:'运动',
    opts:[{cn:'有氧运动',en:'cardio'},{cn:'力量训练',en:'weight training'},{cn:'教练',en:'trainer'},{cn:'跑步机',en:'treadmill'}],
    explain:'【知识点】cardio vs weight training<br>cardio = 有氧运动（练心肺）<br>weight training = 力量训练（练肌肉）<br><br>【记忆口诀】cardio=心肺(跑跳游)，weight=肌肉(举铁蹲)' },
  { en:'treadmill', cn:'跑步机', ph:'/ˈtredmɪl/', topic:'运动',
    opts:[{cn:'跑步机',en:'treadmill'},{cn:'椭圆机',en:'elliptical'},{cn:'固定自行车',en:'stationary bike'},{cn:'划船机',en:'rowing machine'}],
    explain:'【知识点】treadmill≠running machine<br>英语不说running machine，只有treadmill<br>tread(踩踏)+mill(磨坊)→踩踏驱动的磨坊<br>【记忆口诀】跑步机→treadmill，不是running machine' },
  // 购物
  { en:'refund', cn:'退款', ph:'/ˈriːfʌnd/', topic:'购物',
    opts:[{cn:'退款',en:'refund'},{cn:'折扣',en:'discount'},{cn:'收据',en:'receipt'},{cn:'划痕',en:'scratch'}],
    explain:'【知识点】refund vs discount vs receipt<br>refund = 退款（买后退钱）<br>discount = 折扣（买时打折）<br>receipt = 收据（购物凭证）<br>【记忆口诀】refund=退钱，discount=打折，receipt=收据' },
  { en:'brand new', cn:'全新的', ph:'', topic:'购物',
    opts:[{cn:'全新的',en:'brand new'},{cn:'二手的',en:'second-hand'},{cn:'轻微使用的',en:'slightly used'},{cn:'状况良好的',en:'in good condition'}],
    explain:'【知识点】brand new vs second-hand<br>brand new = 全新的<br>second-hand = 二手的<br>注意：brand new中brand不是"品牌"<br>【记忆口诀】brand new=全新，second-hand=二手' },
  { en:'discount', cn:'折扣', ph:'/ˈdɪskaʊnt/', topic:'购物',
    opts:[{cn:'折扣',en:'discount'},{cn:'退款',en:'refund'},{cn:'收据',en:'receipt'},{cn:'讨价还价',en:'bargain'}],
    explain:'【知识点】discount vs bargain<br>discount = 折扣（商家主动降价）<br>bargain = 讨价还价（买家争取降价）<br>【记忆口诀】discount=商家打折，bargain=买家砍价' },
  // 办公用品
  { en:'stapler', cn:'订书机', ph:'/ˈsteɪplər/', topic:'办公',
    opts:[{cn:'订书机',en:'stapler'},{cn:'订书钉',en:'staple'},{cn:'回形针',en:'paper clip'},{cn:'文件夹',en:'folder'}],
    explain:'【知识点】stapler vs staple<br>stapler = 订书机（工具，-er结尾）<br>staple = 订书钉（耗材，没有-er）<br><br>【记忆口诀】-er=机器/工具，没有-er=耗材/部件' },

const TOPICS = ['全部','租房','运动','购物','办公','手机','性格','情绪','职场','旅行','搭配','否定表达','狼来了','看医生','祈使句','坐飞机','交通出行','入住酒店','点餐用餐','问路方向','购物消费','出入境','简单聊天','时态动词','完成时搭配','情态搭配','从句引导词','药店看病','职业工作','面试求职','性格描述','短语动词','日常生活'];

// ====== 状态 ======
let totalScore = 0;
let maxCombo = 0;
let currentCombo = 0;
let masteredSet = new Set();
let currentMode = ''; // en2cn, cn2en, mix, spellall
let currentTopic = '全部';
let questions = [];
let qIndex = 0;
let answered = false;
let correctCount = 0;
let wrongCount = 0;

// ====== 初始化 ======
function init() {
  renderCatBar();
  updateHomeStats();
}

function renderCatBar() {
  const bar = document.getElementById('catBar');
  bar.innerHTML = TOPICS.map(t =>
    `<button class="cat-btn ${t===currentTopic?'active':''}" onclick="selectTopic('${t}')">${t==='全部'?'🔄 全部':t}</button>`
  ).join('');
}

function selectTopic(t) {
  currentTopic = t;
  renderCatBar();
}

function updateHomeStats() {
  document.getElementById('hScore').textContent = totalScore;
  document.getElementById('hCombo').textContent = maxCombo;
  const hMasterEl = document.getElementById('hMaster');
  if(hMasterEl) hMasterEl.textContent = masteredSet.size;
}

// ====== 开始练习 ======
function startPractice(mode) {
  currentMode = mode;
  answered = false;
  correctCount = 0;
  wrongCount = 0;

  // 过滤题目
  let pool = currentTopic === '全部' ? [...WORDS] : WORDS.filter(w => w.topic === currentTopic);
  if(pool.length === 0) {
    showToast('该主题暂无题目');
    return;
  }

  // 根据模式生成题目
  if(mode === 'en2cn') {
    questions = shuffle(pool).map(w => ({ ...w, mode:'en2cn' }));
  } else if(mode === 'cn2en') {
    questions = shuffle(pool).map(w => ({ ...w, mode:'cn2en' }));
  } else if(mode === 'mix') {
    questions = shuffle(pool).map(w => {
      const m = Math.random() < 0.5 ? 'en2cn' : 'cn2en';
      return { ...w, mode:m };
    });
  } else if(mode === 'spellall') {
    questions = shuffle(pool).map(w => ({ ...w, mode:'cn2en' }));
  }

  qIndex = 0;
  showPage('practicePage');
  renderQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for(let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function showPage(id) {
  document.getElementById('homePage').style.display = id==='homePage' ? 'flex' : 'none';
  document.getElementById('practicePage').className = id==='practicePage' ? 'practice-page active' : 'practice-page';
  document.getElementById('resultPage').className = id==='resultPage' ? 'result-page active' : 'result-page';
}

// ====== 渲染题目 ======
function renderQuestion() {
  if(qIndex >= questions.length) {
    showResult();
    return;
  }

  answered = false;
  const q = questions[qIndex];
  const area = document.getElementById('qArea');
  const total = questions.length;
  const pct = ((qIndex) / total * 100).toFixed(0);

  document.getElementById('pInfo').textContent = `${qIndex+1} / ${total}`;
  document.getElementById('pFill').style.width = pct + '%';

  if(q.mode === 'en2cn') {
    renderEn2Cn(q, area);
  } else {
    renderCn2En(q, area);
  }
}

// ====== 模式1：看英文猜中文 ======
function renderEn2Cn(q, area) {
  const shuffledOpts = shuffle(q.opts);
  const correctCn = q.cn;

  area.innerHTML = `
    <div class="q-prompt">${q.en}</div>
    ${q.ph ? `<div class="phonetic">${q.ph}</div>` : ''}
    <div class="q-sub">这个单词是什么意思？</div>
    <div class="opts-grid">
      ${shuffledOpts.map((o,i) => `
        <button class="opt-btn" onclick="selectOpt(${i},'${o.cn}','${correctCn}',this)" data-cn="${o.cn}">
          ${o.cn}
        </button>
      `).join('')}
    </div>
    <div class="explain-area" id="explainArea"></div>
    <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQuestion()">下一题 →</button>
  `;
}

function selectOpt(idx, selectedCn, correctCn, btn) {
  if(answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.opt-btn');
  const isCorrect = selectedCn === correctCn;

  // 标记所有按钮
  allBtns.forEach(b => {
    const bCn = b.getAttribute('data-cn');
    if(bCn === correctCn) b.className = 'opt-btn correct';
    else if(b === btn && !isCorrect) b.className = 'opt-btn wrong';
    else b.className = 'opt-btn';
    b.style.pointerEvents = 'none';
  });

  // 计分
  if(isCorrect) {
    correctCount++;
    currentCombo++;
    if(currentCombo > maxCombo) maxCombo = currentCombo;
    totalScore += 10 + currentCombo * 2;
    masteredSet.add(questions[qIndex].en);
  } else {
    wrongCount++;
    currentCombo = 0;
  }

  // 显示解析
  showExplainForEn2Cn(questions[qIndex], isCorrect, selectedCn);

  document.getElementById('nextBtn').style.display = 'block';
}

function showExplainForEn2Cn(q, isCorrect, selectedCn) {
  const ea = document.getElementById('explainArea');

  // 所有选项含义
  let meaningsHtml = '<div class="opts-meanings"><div class="explain-title">📋 所有选项含义</div>';
  q.opts.forEach(o => {
    let cls = '';
    if(o.cn === q.cn) cls = 'opts-meaning-correct';
    if(o.cn === selectedCn && !isCorrect) cls = 'opts-meaning-selected';
    meaningsHtml += `<div class="opts-meaning-item ${cls}">
      <span class="opts-meaning-word">${o.en}</span>
      <span class="opts-meaning-cn">= ${o.cn}</span>
      ${o.cn === q.cn ? '<span style="color:var(--success);font-weight:700;font-size:12px;">✅ 正确答案</span>' : ''}
      ${o.cn === selectedCn && !isCorrect ? '<span style="color:var(--danger);font-weight:700;font-size:12px;">❌ 你的选择</span>' : ''}
    </div>`;
  });
  meaningsHtml += '</div>';

  // 拼写练习区
  let spellHtml = `<div class="spell-practice">
    <div class="spell-practice-title">✍️ 拼写练习：把 ${q.cn} 的英文拼一遍</div>
    <div class="spell-practice-row">
      <span class="spell-practice-word">${q.cn}</span>
      <input class="spell-practice-input" id="spellInput" placeholder="输入英文..." autocomplete="off">
      <button class="spell-practice-btn" onclick="checkSpellPractice('${q.en}')">检查</button>
      <span class="spell-practice-result" id="spellResult"></span>
    </div>
    <button class="spell-show" onclick="showAnswer('${q.en}')">看答案</button>
  </div>`;

  // 详细解析
  const explainHtml = `<div class="explain-content">${q.explain}</div>`;

  ea.innerHTML = meaningsHtml + spellHtml + explainHtml;
  ea.className = 'explain-area show';
}

// ====== 模式2：看中文拼英文 ======
function renderCn2En(q, area) {
  area.innerHTML = `
    <div class="spell-prompt">${q.cn}</div>
    ${q.ph ? `<div class="phonetic">音标：${q.ph}</div>` : ''}
    <div class="spell-hint">请拼写对应的英文</div>
    <div class="spell-section">
      <div class="spell-row">
        <input class="spell-input" id="mainSpellInput" placeholder="输入英文..." autocomplete="off">
        <button class="spell-submit" onclick="submitSpell('${q.en}')">提交</button>
        <button class="spell-show" onclick="showMainAnswer('${q.en}')">看答案</button>
      </div>
    </div>
    <div class="explain-area" id="explainArea"></div>
    <button class="next-btn" id="nextBtn" style="display:none" onclick="nextQuestion()">下一题 →</button>
  `;

  // 自动聚焦
  const inp = document.getElementById('mainSpellInput');
  if(inp) inp.focus();
}

function submitSpell(correctEn) {
  if(answered) return;
  const inp = document.getElementById('mainSpellInput');
  if(!inp) return;
  const val = inp.value.trim().toLowerCase();
  if(!val) { showToast('请输入答案'); return; }

  answered = true;
  const correctLower = correctEn.toLowerCase();
  const isCorrect = val === correctLower;

  inp.className = 'spell-input ' + (isCorrect ? 'correct' : 'wrong');
  inp.disabled = true;

  if(isCorrect) {
    correctCount++;
    currentCombo++;
    if(currentCombo > maxCombo) maxCombo = currentCombo;
    totalScore += 15 + currentCombo * 3;
    masteredSet.add(questions[qIndex].en);
  } else {
    wrongCount++;
    currentCombo = 0;
  }

  // 显示解析
  showExplainForCn2En(questions[qIndex], isCorrect, val);
  document.getElementById('nextBtn').style.display = 'block';
}

function showExplainForCn2En(q, isCorrect, userAns) {
  const ea = document.getElementById('explainArea');

  // 正确答案展示
  let ansHtml = `<div class="explain-title">${isCorrect ? '✅ 拼写正确！' : '❌ 正确答案是：'}</div>`;
  if(!isCorrect) {
    ansHtml += `<div style="font-size:18px;font-weight:700;color:var(--success);margin-bottom:8px;">${q.en} ${q.ph}</div>`;
    ansHtml += `<div style="font-size:13px;color:var(--danger);margin-bottom:8px;">你的答案：${userAns}</div>`;
  } else {
    ansHtml += `<div style="font-size:18px;font-weight:700;color:var(--success);margin-bottom:8px;">${q.en} ${q.ph} ✅</div>`;
  }

  // 如果是选择题类型的词，展示所有选项含义
  let meaningsHtml = '';
  if(q.opts && q.opts.length > 1) {
    meaningsHtml = '<div class="opts-meanings"><div class="explain-title">📋 相关词汇对比</div>';
    q.opts.forEach(o => {
      let cls = '';
      if(o.en.toLowerCase() === q.en.toLowerCase()) cls = 'opts-meaning-correct';
      if(o.en.toLowerCase() === userAns.toLowerCase() && !isCorrect) cls = 'opts-meaning-selected';
      meaningsHtml += `<div class="opts-meaning-item ${cls}">
        <span class="opts-meaning-word">${o.en}</span>
        <span class="opts-meaning-cn">= ${o.cn}</span>
        ${o.en.toLowerCase() === q.en.toLowerCase() ? '<span style="color:var(--success);font-weight:700;font-size:12px;">✅ 正确答案</span>' : ''}
      </div>`;
    });
    meaningsHtml += '</div>';
  }

  // 拼写练习区（再拼一遍巩固）
  let spellHtml = `<div class="spell-practice">
    <div class="spell-practice-title">✍️ 再拼一遍巩固记忆</div>
    <div class="spell-practice-row">
      <span class="spell-practice-word">${q.cn}</span>
      <input class="spell-practice-input" id="spellInput2" placeholder="再拼一次..." autocomplete="off">
      <button class="spell-practice-btn" onclick="checkSpellPractice2('${q.en}')">检查</button>
      <span class="spell-practice-result" id="spellResult2"></span>
    </div>
  </div>`;

  const explainHtml = `<div class="explain-content">${q.explain}</div>`;

  ea.innerHTML = ansHtml + meaningsHtml + spellHtml + explainHtml;
  ea.className = 'explain-area show';
}

// ====== 拼写练习辅助函数 ======
function checkSpellPractice(correctEn) {
  const inp = document.getElementById('spellInput');
  const res = document.getElementById('spellResult');
  if(!inp || !res) return;
  const val = inp.value.trim().toLowerCase();
  const correct = correctEn.toLowerCase();
  if(!val) { showToast('请输入英文'); return; }
  if(val === correct) {
    inp.className = 'spell-practice-input correct';
    res.textContent = '✅';
    res.style.color = 'var(--success)';
  } else {
    inp.className = 'spell-practice-input wrong';
    res.textContent = '❌ ' + correctEn;
    res.style.color = 'var(--danger)';
  }
}

function checkSpellPractice2(correctEn) {
  const inp = document.getElementById('spellInput2');
  const res = document.getElementById('spellResult2');
  if(!inp || !res) return;
  const val = inp.value.trim().toLowerCase();
  const correct = correctEn.toLowerCase();
  if(!val) { showToast('请输入英文'); return; }
  if(val === correct) {
    inp.className = 'spell-practice-input correct';
    res.textContent = '✅';
    res.style.color = 'var(--success)';
  } else {
    inp.className = 'spell-practice-input wrong';
    res.textContent = '❌ ' + correctEn;
    res.style.color = 'var(--danger)';
  }
}

function showAnswer(ans) {
  const inp = document.getElementById('spellInput');
  if(inp) {
    inp.value = ans;
    inp.className = 'spell-practice-input correct';
    const res = document.getElementById('spellResult');
    if(res) { res.textContent = '👀 已显示答案'; res.style.color = 'var(--accent)'; }
  }
}

function showMainAnswer(ans) {
  const inp = document.getElementById('mainSpellInput');
  if(inp && !answered) {
    inp.value = ans;
    inp.className = 'spell-input correct';
    answered = true;
    // 不计分，只展示答案
    showExplainForCn2En(questions[qIndex], false, '（看了答案）');
    document.getElementById('nextBtn').style.display = 'block';
  }
}

// ====== 下一题 ======
function nextQuestion() {
  qIndex++;
  renderQuestion();
}

// ====== 结果页 ======
function showResult() {
  const total = questions.length;
  const pct = Math.round(correctCount / total * 100);
  let icon, title;

  if(pct >= 90) { icon = '🏆'; title = '太厉害了！'; }
  else if(pct >= 70) { icon = '🎉'; title = '很不错！'; }
  else if(pct >= 50) { icon = '💪'; title = '继续加油！'; }
  else { icon = '📚'; title = '需要多练习'; }

  document.getElementById('rIcon').textContent = icon;
  document.getElementById('rTitle').textContent = title;
  document.getElementById('rScore').textContent = totalScore;

  document.getElementById('rDetail').innerHTML = `
    <div class="result-row"><span class="result-row-label">正确</span><span class="result-row-val" style="color:var(--success)">${correctCount} 题</span></div>
    <div class="result-row"><span class="result-row-label">错误</span><span class="result-row-val" style="color:var(--danger)">${wrongCount} 题</span></div>
    <div class="result-row"><span class="result-row-label">正确率</span><span class="result-row-val">${pct}%</span></div>
    <div class="result-row"><span class="result-row-label">最高连击</span><span class="result-row-val">${maxCombo}</span></div>
    <div class="result-row"><span class="result-row-label">已掌握</span><span class="result-row-val">${masteredSet.size} 词</span></div>
  `;

  showPage('resultPage');
}

function goHome() {
  updateHomeStats();
  showPage('homePage');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast-msg';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// 启动
// URL param: ?topic=时态动词 → auto-select matching topic + show focus banner
(function(){
  var p = new URLSearchParams(location.search);
  var t = p.get('topic');
  if (t) {
    // Add "← 学习计划" link next to the home link
    var homeLink = document.querySelector('a[href*="学习中心"]');
    if (homeLink) {
      var spLink = document.createElement('a');
      spLink.href = 'study-plan.html';
      spLink.style.cssText = 'display:inline-block;margin:8px 4px;padding:6px 14px;background:#8B5CF6;color:white;border-radius:8px;text-decoration:none;font-size:14px;font-weight:500;';
      spLink.textContent = '← 学习计划';
      homeLink.parentNode.insertBefore(spLink, homeLink.nextSibling);
    }
    if (TOPICS.indexOf(t) >= 0) {
      currentTopic = t;
      // Add focus banner on home page
      var banner = document.createElement('div');
      banner.id = 'focusBanner';
      banner.innerHTML = '<div style="background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:white;padding:12px 16px;border-radius:10px;margin:12px 0;text-align:center;font-size:15px;font-weight:600;">🎯 聚焦练习：' + t + ' · 点击下方模式直接开始</div>';
      var homePage = document.getElementById('homePage');
      if (homePage) {
        var hero = homePage.querySelector('.home-hero');
        if (hero) hero.parentNode.insertBefore(banner, hero.nextSibling);
        else homePage.insertBefore(banner, homePage.firstChild);
      }
    }
  }
})();
init();

// ====== 全局回车键 ======
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  // 焦点在输入框时不拦截
  var activeEl = document.activeElement;
  if (activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA')) {
    return;
  }
  // 练习页面：如果下一题按钮可见，按回车进入下一题
  var nextBtn = document.getElementById('nextBtn');
  if (nextBtn && nextBtn.style.display === 'block') {
    nextQuestion();
  }
  // 结果页面：按回车回到首页
  var resultPage = document.getElementById('resultPage');
  if (resultPage && resultPage.style.display !== 'none') {
    goHome();
  }
});
</script>
